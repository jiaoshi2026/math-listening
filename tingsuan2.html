<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>梯度二 · 听算练习 | 智慧整理</title>
  <style>
    :root {
      --bg: #fefaf5;
      --card: #ffffff;
      --accent: #b45f2a;
      --accent-light: #f5b17b;
      --text: #3e2c1c;
      --border: #e7c7a2;
      --highlight: #fff9f2;
      --shadow: 0 8px 28px rgba(120, 70, 30, 0.08);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #f9efe2 0%, #fef7ed 100%);
      font-family: 'Noto Serif SC', '楷体', 'KaiTi', '宋体', 'SimSun', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
      line-height: 1.7;
    }
    .container {
      max-width: 750px;
      width: 100%;
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(180, 120, 60, 0.1);
      padding: 40px 38px;
      position: relative;
    }
    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #d68b4a, #f5b17b, #d68b4a);
      border-radius: 28px 28px 0 0;
    }
    .header {
      text-align: center;
      margin-bottom: 10px;
    }
    .badge {
      display: inline-block;
      background: #e09e5e;
      color: white;
      padding: 4px 22px;
      border-radius: 22px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 1.8rem;
      color: #4b2e1d;
      font-weight: 700;
      margin: 6px 0 4px;
    }
    .header .sub {
      font-size: 0.95rem;
      color: #8b5a3a;
    }
    .recap-box {
      background: #fdf3e4;
      border-radius: 14px;
      padding: 14px 18px;
      margin: 16px 0;
      font-size: 0.95rem;
      color: #6b4a2c;
      border: 1px solid #ebc9a2;
    }
    .recap-box strong {
      color: #4b2e1d;
    }
    .instruction {
      background: #fffaee;
      border-left: 5px solid #e09e5e;
      padding: 14px 18px;
      border-radius: 12px;
      margin: 20px 0;
      font-size: 0.98rem;
    }
    .audio-panel {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 16px 0 20px;
      background: #fff9f2;
      padding: 16px 20px;
      border-radius: 18px;
      border: 1px solid #f3d9b1;
    }
    .btn {
      background: #d68b4a;
      border: none;
      color: white;
      padding: 12px 26px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      background: #b45f2a;
    }
    .btn:active {
      background: #8b3a1f;
    }
    .btn.secondary {
      background: #fdebd0;
      color: #6b4a2c;
      border: 1px solid #ebc9a2;
    }
    .btn.secondary:hover {
      background: #f5d5a8;
    }
    .listen-count {
      font-weight: 600;
      color: #8b3a1f;
      font-size: 0.95rem;
    }
    .progress {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .progress .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e7c7a2;
      transition: background 0.3s;
    }
    .progress .dot.done {
      background: #d68b4a;
    }
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      margin: 20px 0;
    }
    @media (max-width: 500px) {
      .input-grid {
        grid-template-columns: 1fr;
      }
    }
    .input-group {
      background: #fffbf5;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid #ecdbba;
    }
    .input-group label {
      display: block;
      font-weight: 600;
      color: #4b2e1d;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    .input-group input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e7c7a2;
      border-radius: 12px;
      font-size: 1.1rem;
      text-align: center;
      background: white;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #d68b4a;
      box-shadow: 0 0 0 3px rgba(214, 139, 74, 0.15);
    }
    .input-group input.correct {
      border-color: #5a9e6f;
      background: #f2faf4;
    }
    .input-group input.wrong {
      border-color: #c0392b;
      background: #fef5f5;
    }
    .star-rating {
      display: flex;
      gap: 8px;
      font-size: 2rem;
      cursor: pointer;
      margin: 8px 0;
      user-select: none;
      justify-content: center;
    }
    .star-rating .star {
      color: #e0b07c;
      transition: color 0.15s;
    }
    .star-rating .star.filled {
      color: #f7b731;
    }
    .feedback {
      text-align: center;
      font-weight: 600;
      font-size: 1.05rem;
      margin: 10px 0;
      min-height: 28px;
    }
    .btn-check {
      margin: 10px auto;
      display: block;
    }
    .hint-text {
      font-size: 0.85rem;
      color: #8b5a3a;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="badge">🌿 梯度二 · 拓展探究</span>
      <h1>听算练习 · 智慧整理</h1>
      <p class="sub">回顾已有信息，捕捉新条件</p>
    </div>

    <div class="recap-box">
      <strong>📋 回顾已知信息：</strong>三（1）班42人，每人捐8本；三（2）班38人，每人捐9本；三（3）班45人。
    </div>

    <div class="instruction">
      <p>🎧 点击播放按钮，系统将朗读关于三（3）班的<strong>补充信息</strong>，共朗读三遍。</p>
      <p>📌 听完后，请根据新信息填写下方内容。</p>
    </div>

    <div class="audio-panel">
      <button class="btn" id="btnPlay" onclick="playNext()">🔊 播放朗读</button>
      <button class="btn secondary" id="btnStop" onclick="stopAudio()">⏹️ 停止</button>
      <span class="listen-count" id="listenLabel">第 0 / 3 遍</span>
      <div class="progress">
        <span class="dot" id="dot1"></span>
        <span class="dot" id="dot2"></span>
        <span class="dot" id="dot3"></span>
      </div>
    </div>

    <div class="input-grid">
      <div class="input-group">
        <label>三（3）班每人捐书数量是（1）班和（2）班的什么关系？</label>
        <input type="text" id="input1" placeholder="请填写：和 或 差" autocomplete="off">
      </div>
      <div class="input-group">
        <label>三（3）班每人捐书多少本？（请列式并计算）</label>
        <input type="text" id="input2" placeholder="请填写算式和结果" autocomplete="off">
      </div>
    </div>
    <p class="hint-text">提示：三（1）班每人8本，三（2）班每人9本，三（3）班每人捐书数量是两者的差。</p>

    <div style="text-align:center; margin:8px 0;">
      <span style="font-weight:600; color:#4b2e1d;">🌟 自评听力表现：</span>
      <span class="star-rating" id="starRating">
        <span class="star" data-value="1">☆</span>
        <span class="star" data-value="2">☆</span>
        <span class="star" data-value="3">☆</span>
        <span class="star" data-value="4">☆</span>
        <span class="star" data-value="5">☆</span>
      </span>
    </div>
    <div class="feedback" id="feedbackMsg"></div>
    <button class="btn btn-check" onclick="checkAnswers()">✅ 提交检查</button>
  </div>

  <script>
    const speechText = "三（3）班每人捐书数量是三（1）班和三（2）班每人捐书数量的差。";
    let listenCount = 0;
    let isSpeaking = false;

    function updateDots() {
      for (let i = 1; i <= 3; i++) {
        const dot = document.getElementById('dot' + i);
        if (i <= listenCount) dot.classList.add('done');
        else dot.classList.remove('done');
      }
      document.getElementById('listenLabel').textContent = '第 ' + listenCount + ' / 3 遍';
    }

    function speak(text, callback) {
      if (!window.speechSynthesis) {
        alert('您的浏览器不支持语音朗读，请使用Chrome或Edge浏览器。');
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.85;
      utterance.pitch = 1.0;
      utterance.onend = function() { isSpeaking = false; if (callback) callback(); };
      utterance.onerror = function() { isSpeaking = false; };
      isSpeaking = true;
      window.speechSynthesis.speak(utterance);
    }

    function playNext() {
      if (isSpeaking) return;
      if (listenCount >= 3) { listenCount = 0; updateDots(); }
      listenCount++;
      updateDots();
      document.getElementById('btnPlay').textContent = '🔊 正在朗读第 ' + listenCount + ' 遍...';
      speak(speechText, function() {
        document.getElementById('btnPlay').textContent = '🔊 播放朗读';
        if (listenCount >= 3) {
          document.getElementById('feedbackMsg').textContent = '✅ 三遍朗读已播放完毕，请凭记忆填写上方信息。';
        }
      });
    }

    function stopAudio() {
      window.speechSynthesis.cancel();
      isSpeaking = false;
      document.getElementById('btnPlay').textContent = '🔊 播放朗读';
    }

    const stars = document.querySelectorAll('#starRating .star');
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const value = parseInt(this.dataset.value);
        stars.forEach((s, index) => {
          if (index < value) { s.textContent = '★';
            s.classList.add('filled'); } else { s.textContent = '☆';
            s.classList.remove('filled'); }
        });
      });
    });

    function checkAnswers() {
      const input1 = document.getElementById('input1');
      const input2 = document.getElementById('input2');
      let correctCount = 0;
      // 检查关系词
      const relVal = input1.value.trim().replace(/\s/g, '');
      if (relVal === '差' || relVal === '差关系' || relVal === '相减') {
        input1.classList.add('correct');
        input1.classList.remove('wrong');
        correctCount++;
      } else if (relVal === '和' || relVal === '和关系' || relVal === '相加') {
        input1.classList.add('wrong');
        input1.classList.remove('correct');
      } else if (relVal !== '') {
        input1.classList.add('wrong');
        input1.classList.remove('correct');
      } else {
        input1.classList.remove('correct', 'wrong');
      }
      // 检查计算结果
      const calcVal = input2.value.trim().replace(/\s/g, '');
      if (calcVal === '1' || calcVal === '9-8=1' || calcVal === '1本' || calcVal === '9-8=1（本）') {
        input2.classList.add('correct');
        input2.classList.remove('wrong');
        correctCount++;
      } else if (calcVal !== '') {
        input2.classList.add('wrong');
        input2.classList.remove('correct');
      } else {
        input2.classList.remove('correct', 'wrong');
      }
      const filled = (input1.value.trim() !== '' || input2.value.trim() !== '');
      const msg = document.getElementById('feedbackMsg');
      if (!filled) msg.textContent = '请先填写信息再提交检查。';
      else if (correctCount === 2) msg.textContent = '🎉 完全正确！三（3）班每人捐书数量是两者的差，即9-8=1本。';
      else if (correctCount === 1) msg.textContent = '有一项正确，另一项需要修改。';
      else msg.textContent = '有些信息不对，绿色正确、红色需修改，再试试看。';
    }
    updateDots();
  </script>
</body>
</html>
