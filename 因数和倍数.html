            align-items: center;

<div class="container">

                </div>

        { text: "100 + 101 的和是奇数还是偶数？", answer: "奇数" },
        { text: "一个奇数与一个质数（不为2）的和是奇数还是偶数？", answer: "偶数" },
        { text: "两个奇数的积再加上一个偶数，结果是奇数还是偶数？", answer: "奇数" },
        { text: "任意两个偶数的差是奇数还是偶数？", answer: "偶数" },
        { text: "1×2 + 3×4 的结果是奇数还是偶数？", answer: "偶数" },
        { text: "5×7 + 8 的结果是奇数还是偶数？", answer: "奇数" },
        { text: "一个奇数与它本身的和是奇数还是偶数？", answer: "偶数" },
        { text: "一个偶数与它本身的积是奇数还是偶数？", answer: "偶数" },
        { text: "11 + 13 + 15 的和是奇数还是偶数？", answer: "奇数" },
        { text: "20 + 22 + 24 的和是奇数还是偶数？", answer: "偶数" },
        { text: "一个奇数减去一个偶数的结果是奇数还是偶数？", answer: "奇数" },
        { text: "一个偶数减去一个奇数的结果是奇数还是偶数？", answer: "奇数" }
    ];
    const block5Pool = [
        { text: "一个数既是 36 的因数，又是 6 的倍数，这个数最大是多少？", answer: "36" },
        { text: "在 1~20 中，既是质数又是奇数的数有几个？", answer: "7" },
        { text: "既是2和3的倍数，又是5的倍数的最大两位数是多少？", answer: "90" },
        { text: "两个质数的和是16，积是39，这两个质数是多少？", answer: "3,13" },
        { text: "最小的三位质数是多少？", answer: "101" },
        { text: "一个自然数，它的最大因数是30，最小倍数也是30，这个数是？", answer: "30" },
        { text: "相邻两个偶数的和一定是奇数还是偶数？", answer: "偶数" },
        { text: "写出 72 的所有因数中，合数的个数？", answer: "9" },
        { text: "在 1 到 50 中，是 12 的倍数的数有哪些？", answer: "12,24,36,48" },
        { text: "一个两位数，个位是最小的质数，十位是最小的合数，这个数是？", answer: "42" },
        { text: "两个不同质数的积是 21，这两个质数分别是？", answer: "3,7" },
        { text: "100以内最大的质数是多少？", answer: "97" },
        { text: "一个偶数，它有因数5，又是3的倍数，最小三位数是多少？", answer: "120" },
        { text: "相邻两个奇数的和是奇数还是偶数？", answer: "偶数" },
        { text: "一个数的最小倍数是25，最大因数是25，它的所有因数中，奇数有几个？", answer: "3" },
        { text: "一个三位数，同时是2、3、5的倍数，且百位是1，十位是2，这个数是？", answer: "120" },
        { text: "在 1~100 中，既是奇数又是合数的最大数是多少？", answer: "99" },
        { text: "两个连续奇数的积是 15，这两个数是？", answer: "3,5" },
        { text: "一个两位数，既是3的倍数又是5的倍数，且十位数字是最大的一位数，这个数是？", answer: "90" },
        { text: "最小的合数与最小的质数的和是多少？", answer: "6" },
        { text: "在 40~60 之间，质数有几个？", answer: "5" },
        { text: "一个数除以2余1，除以3余2，除以5余0，这个数最小是多少？", answer: "15" },
        { text: "既是奇数又是合数的最小两位数是多少？", answer: "15" },
        { text: "一个数，它的最大因数和最小倍数都是 42，这个数的因数中，质数有几个？", answer: "3" },
        { text: "在 10~30 中，既是2的倍数又是3的倍数的数有几个？", answer: "4" },
        { text: "一个质数的2倍加上另一个质数的3倍等于 23，这两个质数分别是？", answer: "2,5" },
        { text: "两个偶数的和加上一个奇数的结果是奇数还是偶数？", answer: "奇数" },
        { text: "一个数有因数 2、3、5，且是三位数，最小是多少？", answer: "120" },
        { text: "写出 80 以内 8 的倍数中，最大的奇数？", answer: "不存在" },
        { text: "在 1~30 中，是 15 的倍数的数有几个？", answer: "2" },
        { text: "一个合数至少有 3 个因数，这句话对吗？", answer: "对" },
        { text: "两个质数的差是 2，积是 35，这两个数是？", answer: "5,7" },
        { text: "既是 4 的倍数，又是 6 的倍数的最小三位数是多少？", answer: "108" },
        { text: "一个自然数，既是奇数又是合数，且是 3 的倍数，最小是多少？", answer: "9" },
        { text: "在 50~70 之间，同时是2和5的倍数的数有几个？", answer: "2" }
    ];

    const allPools = {
        block1: block1Pool,
        block2: block2Pool,
        block3: block3Pool,
        block4: block4Pool,
        block5: block5Pool
    };

    // 当前状态
    let currentBlockId = "block1";
    let currentQuestions = [];
    let currentIndex = 0;
    let answersVisible = false;
    let currentSpeechTimer = null;
    let pendingNextSpeechTimer = null; // 备用
    let isQuestionRevealed = false;     // 当前题目是否已显示

    // DOM
    const blockSelectCard = document.getElementById("blockSelectCard");
    const quizCard = document.getElementById("quizCard");
    const blockTitle = document.getElementById("blockTitle");
    const progressLabel = document.getElementById("progressLabel");
    const questionRevealContainer = document.getElementById("questionRevealContainer");
    const manualSpeakBtn = document.getElementById("manualSpeakBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const toggleAnswersBtn = document.getElementById("toggleAnswersBtn");
    const backToModuleBtn = document.getElementById("backToModuleBtn");
    const answersListDiv = document.getElementById("answersList");
    const answersPlaceholderDiv = document.getElementById("answersPlaceholder");

    // 全局函数，用于点击占位区域显示题目（必须挂载到window上，因为onclick属性调用）
    window.revealQuestion = function() {
        if (isQuestionRevealed) return;
        if (!currentQuestions.length) return;
        const currentText = currentQuestions[currentIndex].text;
        // 替换内容为题目文本
        questionRevealContainer.innerHTML = `<div class="question-text-display">${currentText}</div>`;
        questionRevealContainer.style.cursor = "default";
        isQuestionRevealed = true;
    };

    // 重置题目区域为占位状态（隐藏题目）
    function resetQuestionReveal() {
        questionRevealContainer.innerHTML = `
            <div class="question-placeholder">
                <span>📖</span>
                <div>点击显示题目</div>
            </div>
        `;
        questionRevealContainer.style.cursor = "pointer";
        isQuestionRevealed = false;
    }

    // 停止所有朗读及定时器
    function cancelAllSpeech() {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        if (currentSpeechTimer) {
            clearTimeout(currentSpeechTimer);
            currentSpeechTimer = null;
        }
        if (pendingNextSpeechTimer) {
            clearTimeout(pendingNextSpeechTimer);
            pendingNextSpeechTimer = null;
        }
    }

    // 朗读当前题目三遍，每遍间隔2秒（语速0.8）
    function speakCurrentThreeTimes() {
        if (!currentQuestions.length) return;
        const textToSpeak = currentQuestions[currentIndex].text;
        cancelAllSpeech();

        let repeatCount = 0;
        const speakOnce = () => {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = "zh-CN";
            utterance.rate = 0.8;
            utterance.onend = () => {
                repeatCount++;
                if (repeatCount < 3) {
                    currentSpeechTimer = setTimeout(() => {
                        if (currentSpeechTimer) speakOnce();
                    }, 2000);
                } else {
                    currentSpeechTimer = null;
                }
            };
            window.speechSynthesis.speak(utterance);
        };
        speakOnce();
    }

    // 立即朗读（无延迟）
    function speakImmediate() {
        speakCurrentThreeTimes();
    }

    // 随机抽取
    function randomPickQuestions(pool, min=10, max=15) {
        const count = Math.floor(Math.random() * (max - min + 1)) + min;
        const shuffled = [...pool];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function refreshCurrentBlock() {
        const pool = allPools[currentBlockId];
        if (!pool) return;
        currentQuestions = randomPickQuestions(pool, 10, 15);
        currentIndex = 0;
        renderCurrentQuestion();
        answersListDiv.style.display = "none";
        answersPlaceholderDiv.style.display = "block";
        answersVisible = false;
        const blockNames = { block1:"板块一·因数倍数", block2:"板块二·2,3,5倍数特征+奇偶", block3:"板块三·质数与合数", block4:"板块四·和的奇偶性", block5:"板块五·综合闯关" };
        blockTitle.innerText = `${blockNames[currentBlockId]} (共${currentQuestions.length}题)`;
        resetQuestionReveal();  // 切换题目后重置占位
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length) return;
        progressLabel.innerText = `第${currentIndex+1} / ${currentQuestions.length}题`;
        // 注意：题目文本不自动显示到DOM，只存储在数据中；如果已显示题目，则更新显示内容
        if (isQuestionRevealed) {
            // 如果当前题目已经显示，则更新显示文本（避免显示旧题目）
            const currentText = currentQuestions[currentIndex].text;
            questionRevealContainer.innerHTML = `<div class="question-text-display">${currentText}</div>`;
            questionRevealContainer.style.cursor = "default";
        } else {
            // 确保占位状态
            resetQuestionReveal();
        }
    }

    // 下一题：立即朗读，重置占位
    function nextQuestion() {
        if (!currentQuestions.length) return;
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            renderCurrentQuestion();
            speakImmediate();
        } else {
            cancelAllSpeech();
            alert(`🎉 恭喜！已完成本组 ${currentQuestions.length} 道听算题！点击「显示答案」核对纸上答案，或「换一组题目」继续练习。`);
        }
    }

    // 换一组：刷新后立即朗读第一题，重置占位
    function resetQuestions() {
        cancelAllSpeech();
        refreshCurrentBlock();
        speakImmediate();
    }

    function toggleAnswers() {
        if (answersVisible) {
            answersListDiv.style.display = "none";
            answersPlaceholderDiv.style.display = "block";
            answersVisible = false;
        } else {
            let html = `<div class="answers-grid">`;
            currentQuestions.forEach((q, idx) => {
                html += `
                    <div class="answer-item">
                        <div class="answer-index">第${idx+1}题</div>
                        <div style="font-weight:500;">${q.text.length > 55 ? q.text.substring(0,55)+'…' : q.text}</div>
                        <div style="color:#b86f1c; margin-top:6px;">✔ 答案：${q.answer}</div>
                    </div>
                `;
            });
            html += `</div>`;
            answersListDiv.innerHTML = html;
            answersListDiv.style.display = "block";
            answersPlaceholderDiv.style.display = "none";
            answersVisible = true;
        }
    }

    function backToModule() {
        cancelAllSpeech();
        quizCard.style.transition = "opacity 0.2s";
        quizCard.style.opacity = "0";
        setTimeout(() => {
            quizCard.style.display = "none";
            blockSelectCard.style.display = "block";
            blockSelectCard.style.opacity = "0";
            blockSelectCard.style.transition = "opacity 0.2s";
            setTimeout(() => {
                blockSelectCard.style.opacity = "1";
            }, 20);
        }, 200);
    }

    function switchToBlock(blockId) {
        currentBlockId = blockId;
        cancelAllSpeech();
        blockSelectCard.style.transition = "opacity 0.2s";
        blockSelectCard.style.opacity = "0";
        setTimeout(() => {
            blockSelectCard.style.display = "none";
            quizCard.style.display = "block";
            quizCard.style.opacity = "0";
            quizCard.style.transition = "opacity 0.2s";
            setTimeout(() => {
                quizCard.style.opacity = "1";
            }, 20);
            refreshCurrentBlock();
            speakImmediate();  // 进入板块立即朗读第一题
        }, 200);
        document.querySelectorAll(".block-btn-vertical").forEach(btn => {
            if (btn.dataset.block === blockId) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function buildVerticalBlocks() {
        const blocks = [
            { id: "block1", name: "📘 因数倍数基础" },
            { id: "block2", name: "🔢 2、3、5倍数+奇偶" },
            { id: "block3", name: "🔍 质数与合数" },
            { id: "block4", name: "🎲 和的奇偶性" },
            { id: "block5", name: "🏆 综合闯关" }
        ];
        const container = document.getElementById("blocksVertical");
        container.innerHTML = "";
        blocks.forEach(block => {
            const btn = document.createElement("button");
            btn.className = "block-btn-vertical";
            btn.dataset.block = block.id;
            btn.innerText = block.name;
            btn.addEventListener("click", () => switchToBlock(block.id));
            container.appendChild(btn);
        });
        if (container.firstChild) container.firstChild.classList.add("active");
    }

    buildVerticalBlocks();
    blockSelectCard.style.display = "block";
    quizCard.style.display = "none";

    manualSpeakBtn.addEventListener("click", () => {
        cancelAllSpeech();
        speakImmediate();
    });
    nextBtn.addEventListener("click", nextQuestion);
    resetBtn.addEventListener("click", resetQuestions);
    toggleAnswersBtn.addEventListener("click", toggleAnswers);
    backToModuleBtn.addEventListener("click", backToModule);
    window.addEventListener("beforeunload", () => cancelAllSpeech());
</script>
</body>
</html>
