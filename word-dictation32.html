            {pinyin:"chèn shān",word:"衬衫",explanation:"一种上衣",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/kV4QWC3WoTW39ZFjf4oYR2.mp3"},
            {pinyin:"fù zé",word:"负责",explanation:"担当责任",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/DiDuztmoah3i3XoNXhz8m4.mp3"},
            {pinyin:"míng shēng",word:"名声",explanation:"名誉",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/GvxL4WFxRJcxTz6nXoS9XL.mp3"},
            {pinyin:"xiè qì",word:"泄气",explanation:"失去信心",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/FNqTz5jxumH8Tb6Sekn43W.mp3"},
            {pinyin:"fàng xīn",word:"放心",explanation:"心情安定",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/XxhF4tn7zA6ySn8yXtkJNf.mp3"},
            {pinyin:"shǒu yì",word:"手艺",explanation:"手工技艺",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/EWLQXoUqLU28o2S2TFCF26.mp3"},
            {pinyin:"gǎn dòng",word:"感动",explanation:"思想感情受触动",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/FSNP6qhTyr5faoEpADf4LK.mp3"},
            {pinyin:"nǎo nù",word:"恼怒",explanation:"生气，发怒",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/jebaCisqrzfGWRZP3uVJjJ.mp3"}
        ]},
        { id:26, title:"26 漏", words:[
            {pinyin:"mò fēi",word:"莫非",explanation:"难道",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Gra8pHmWKzQKwzxdN3ZpKW.mp3"},
            {pinyin:"lì hai",word:"厉害",explanation:"凶猛，高强",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/TpxxN5V2AhbrXPaSLPr6DG.mp3"},
            {pinyin:"zǒu nán chuǎng běi",word:"走南闯北",explanation:"到处闯荡",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/vuaVPm9eHDmMEao84Q4Gpd.mp3"},
            {pinyin:"tīng shuō",word:"听说",explanation:"听人说",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/32FJ5fSSQnMWM5F8m8d5b7.mp3"},
            {pinyin:"fā dǒu",word:"发抖",explanation:"身体颤动",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/FNQLLoCeniDf4ytaxqBrAm.mp3"},
            {pinyin:"hài pà",word:"害怕",explanation:"恐惧",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/UpCWASnq3x7GMPkKQtrEnU.mp3"},
            {pinyin:"sōng shǒu",word:"松手",explanation:"放开手",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/3ykBin2FRT9oXkbDYp6yiB.mp3"},
            {pinyin:"gǔ tou",word:"骨头",explanation:"骨骼",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/v2wTB3jrLpVzofXet99vEF.mp3"},
            {pinyin:"táo mìng",word:"逃命",explanation:"逃跑保命",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/f89shm3rMuyT7EidSFkXJR.mp3"},
            {pinyin:"gān xīn",word:"甘心",explanation:"情愿",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/T2MAcaRhiUpko5Wa23MY9b.mp3"},
            {pinyin:"táo pǎo",word:"逃跑",explanation:"逃走",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/aihtNkZdfm7k9sxUveWpKV.mp3"}
        ]},
        { id:27, title:"语文园地 (四)", words:[
            {pinyin:"hū xī",word:"呼吸",explanation:"一呼一吸",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/m5dgUf4D8WHBm7bm9dMdMF.mp3"},
            {pinyin:"ké sou",word:"咳嗽",explanation:"喉部发痒而发出声音",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/8zQQQsEHZVPJvsU6QLeyd3.mp3"},
            {pinyin:"láo dao",word:"唠叨",explanation:"说话啰嗦",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/ryRst6P42kvPwnXYMd8Xdm.mp3"},
            {pinyin:"yāo he",word:"吆喝",explanation:"大声喊叫",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/HwZRfoyNA3KLsu9u8grPRB.mp3"},
            {pinyin:"sù shuō",word:"诉说",explanation:"告诉，陈述",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/gSUEmTEx3TthZ7Mq6T4cqL.mp3"},
            {pinyin:"fěng cì",word:"讽刺",explanation:"用比喻夸张的话嘲笑",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/WBisHXnMvgdHASB3eySixA.mp3"},
            {pinyin:"gào jiè",word:"告诫",explanation:"警告劝诫",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/SKrWYP3qFiaQU4FYCqsXcR.mp3"},
            {pinyin:"biàn lùn",word:"辩论",explanation:"辩解争论",audioUrl:"https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/R9roepJsqheCYNzdAuwP4A.mp3"}
        ]}
    ];
    
    // 错题记录
    let wrongWordsSet = new Set(JSON.parse(localStorage.getItem('dictation_wrong_v3') || '[]'));
    function saveWrongs() { localStorage.setItem('dictation_wrong_v3', JSON.stringify(Array.from(wrongWordsSet))); }
    
    let currentLesson = null, currentWordIndex = 0, isPlaying = false, animationId = null;
    let isWrongTestMode = false, currentAudio = null, wordIntervalTimeout = null;
    const REPEAT_COUNT = 3, PLAYBACK_RATE = 0.6, GAP_BETWEEN_WORDS = 3000;
    
    const welcomeDiv = document.getElementById('welcome-screen');
    const displayDiv = document.getElementById('display-screen');
    const summaryDiv = document.getElementById('summary-screen');
    const allWordsDiv = document.getElementById('all-words-screen');
    const allWordsGrid = document.getElementById('all-words-grid');
    const lessonListDiv = document.getElementById('lesson-list');
    const pinyinSpan = document.getElementById('pinyin-display');
    const progressBar = document.getElementById('progress-bar');
    const wordIndexSpan = document.getElementById('word-index');
    const summaryGrid = document.getElementById('summary-grid');
    const summaryTitleSpan = document.getElementById('summary-title');
    const sidebar = document.getElementById('sidebar');
    const toggleIcon = document.getElementById('toggle-icon');
    const repeatIndicator = document.getElementById('repeat-indicator');
    const repeatCountSpan = document.getElementById('repeat-count');
    let isSidebarCollapsed = false;
    
    function initLessonsList() {
        lessonListDiv.innerHTML = '';
        lessons.forEach(lesson => {
            const btn = document.createElement('button');
            btn.className = 'w-full text-left px-6 py-4 rounded-xl text-lg font-medium text-gray-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all mb-2';
            btn.innerHTML = `<div class="flex justify-between"><span>${lesson.title}</span><span class="text-sm bg-gray-100 px-2 py-1 rounded">${lesson.words.length}词</span></div>`;
            btn.onclick = (e) => startLesson(lesson, e.currentTarget);
            lessonListDiv.appendChild(btn);
        });
    }
    
    function toggleSidebar() {
        isSidebarCollapsed = !isSidebarCollapsed;
        if(isSidebarCollapsed) { sidebar.classList.add('nav-collapsed'); toggleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />'; }
        else { sidebar.classList.remove('nav-collapsed'); toggleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />'; }
    }
    
    function playWordWithRepeat(wordData, callback) {
        let repeatIdx = 0;
        function playNext() {
            if(repeatIdx >= REPEAT_COUNT) { if(callback) callback(); return; }
            repeatIdx++;
            if(repeatIndicator) { repeatIndicator.classList.remove('hidden'); repeatCountSpan.innerText = repeatIdx; }
            const audio = new Audio(wordData.audioUrl);
            audio.playbackRate = PLAYBACK_RATE;
            audio.onended = () => setTimeout(() => playNext(), 200);
            audio.onerror = () => playNext();
            audio.play().catch(e=>console.warn);
            if(currentAudio) currentAudio.pause();
            currentAudio = audio;
        }
        playNext();
    }
    
    function playCurrentWord() {
        if(!currentLesson || currentWordIndex >= currentLesson.words.length) { finishLesson(); return; }
        const word = currentLesson.words[currentWordIndex];
        wordIndexSpan.innerText = currentWordIndex+1;
        pinyinSpan.innerText = word.pinyin;
        if(wordIntervalTimeout) clearTimeout(wordIntervalTimeout);
        playWordWithRepeat(word, () => {
            const gapStart = performance.now();
            function updateGap() {
                const elapsed = performance.now() - gapStart;
                const percent = Math.min((elapsed / GAP_BETWEEN_WORDS) * 100, 100);
                progressBar.style.width = `${percent}%`;
                if(elapsed < GAP_BETWEEN_WORDS) { animationId = requestAnimationFrame(updateGap); }
                else { progressBar.style.width = '100%'; currentWordIndex++; playCurrentWord(); }
            }
            animationId = requestAnimationFrame(updateGap);
        });
        anime({ targets: '#pinyin-display', opacity: [0,1], scale:[0.8,1], translateY:[20,0], duration:500, easing:'easeOutExpo' });
        setTimeout(() => { if(repeatIndicator) repeatIndicator.classList.add('hidden'); }, 3500);
    }
    
    function startLesson(lesson, btnElem) {
        if(isPlaying && currentAudio) { currentAudio.pause(); cancelAnimationFrame(animationId); if(wordIntervalTimeout) clearTimeout(wordIntervalTimeout); }
        currentLesson = lesson; currentWordIndex = 0; isPlaying = true; isWrongTestMode = false;
        welcomeDiv.classList.add('hidden'); summaryDiv.classList.add('hidden'); allWordsDiv.classList.add('hidden');
        displayDiv.classList.remove('hidden');
        if(!isSidebarCollapsed) toggleSidebar();
        document.querySelectorAll('#lesson-list button').forEach(b => b.classList.remove('nav-item-active'));
        if(btnElem) btnElem.classList.add('nav-item-active');
        playCurrentWord();
    }
    
    function finishLesson() {
        isPlaying = false; if(currentAudio) currentAudio.pause(); cancelAnimationFrame(animationId); if(wordIntervalTimeout) clearTimeout(wordIntervalTimeout);
        displayDiv.classList.add('hidden'); summaryDiv.classList.remove('hidden');
        if(isSidebarCollapsed) toggleSidebar();
        summaryTitleSpan.innerText = `${currentLesson.title} - 词语回顾`;
        renderSummary();
    }
    
    function renderSummary() {
        summaryGrid.innerHTML = '';
        currentLesson.words.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'summary-card p-6 flex flex-col items-center text-center opacity-0';
            card.innerHTML = `<div class="text-emerald-600 text-xl font-bold mb-2">${item.pinyin}</div><div class="text-red-600 text-5xl font-black mb-2">${item.word}</div><div class="text-red-500 text-2xl mb-3">${item.explanation||''}</div><button onclick="replayWordAudio('${item.audioUrl}')" class="mt-2 p-2 rounded-full bg-emerald-50 hover:bg-emerald-100">🔊</button>`;
            summaryGrid.appendChild(card);
        });
        anime({ targets: '.summary-card', opacity: [0,1], translateY: [20,0], delay: anime.stagger(80), duration: 600 });
    }
    
    window.replayWordAudio = (url) => { const aud = new Audio(url); aud.playbackRate = PLAYBACK_RATE; aud.play().catch(e=>console.log); };
    function resetToWelcome() {
        if(currentAudio) currentAudio.pause(); cancelAnimationFrame(animationId); if(wordIntervalTimeout) clearTimeout(wordIntervalTimeout);
        isPlaying = false; summaryDiv.classList.add('hidden'); displayDiv.classList.add('hidden'); allWordsDiv.classList.add('hidden');
        welcomeDiv.classList.remove('hidden'); document.querySelectorAll('#lesson-list button').forEach(b => b.classList.remove('nav-item-active'));
        if(repeatIndicator) repeatIndicator.classList.add('hidden');
    }
    function toggleAllWords() { welcomeDiv.classList.add('hidden'); allWordsDiv.classList.remove('hidden'); renderAllWords(); }
    function hideAllWords() { allWordsDiv.classList.add('hidden'); welcomeDiv.classList.remove('hidden'); }
    function renderAllWords() {
        allWordsGrid.innerHTML = '';
        lessons.forEach(lesson => {
            lesson.words.forEach((item, idx) => {
                const wordId = `${lesson.id}-${idx}`;
                const isWrong = wrongWordsSet.has(wordId);
                const card = document.createElement('div');
                card.className = `summary-card p-4 flex flex-col items-center text-center border relative cursor-pointer ${isWrong ? 'wrong-highlight' : 'border-emerald-100'}`;
                card.innerHTML = `${isWrong ? '<div class="wrong-badge">高频错字</div>' : ''}<div class="text-emerald-600 text-sm font-bold">${item.pinyin}</div><div class="text-red-600 text-3xl font-black">${item.word}</div><div class="text-red-500 text-sm">${item.explanation||''}</div>`;
                card.onclick = () => { toggleWrongWord(wordId); renderAllWords(); };
                allWordsGrid.appendChild(card);
            });
        });
        anime({ targets: '#all-words-grid .summary-card', opacity:[0,1], scale:[0.9,1], delay: anime.stagger(10), duration: 500 });
    }
    function toggleWrongWord(wid) {
        if(wrongWordsSet.has(wid)) wrongWordsSet.delete(wid); else wrongWordsSet.add(wid);
        saveWrongs(); updateWrongTestBtn();
    }
    function updateWrongTestBtn() {
        const btn = document.getElementById('wrong-words-test-btn');
        const span = document.getElementById('wrong-count');
        if(wrongWordsSet.size > 0) { btn.classList.remove('hidden'); span.innerText = wrongWordsSet.size; }
        else btn.classList.add('hidden');
    }
    function startWrongWordsTest() {
        if(wrongWordsSet.size === 0) return;
        const wrongList = [];
        wrongWordsSet.forEach(id => {
            const [lId, idx] = id.split('-').map(Number);
            const lesson = lessons.find(l => l.id === lId);
            if(lesson && lesson.words[idx]) wrongList.push(lesson.words[idx]);
        });
        currentLesson = { title: "错题专项听写", words: wrongList };
        currentWordIndex = 0; isWrongTestMode = true;
        welcomeDiv.classList.add('hidden'); allWordsDiv.classList.add('hidden'); displayDiv.classList.remove('hidden');
        if(!isSidebarCollapsed) toggleSidebar();
        playCurrentWord();
    }
    
    initLessonsList();
    updateWrongTestBtn();
    window.toggleSidebar = toggleSidebar; window.startLesson = startLesson; window.resetToWelcome = resetToWelcome;
    window.toggleAllWords = toggleAllWords; window.hideAllWords = hideAllWords; window.startWrongWordsTest = startWrongWordsTest;
</script>
</body>
