<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>笔算三位数除以一位数听算训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #d2ecbc 0%, #b8efca 60%, #9fd9a5 100%);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "🌸 🌿 🐞";
            font-size: 4rem;
            position: absolute;
            top: 20px;
            left: 20px;
            opacity: 0.1;
            pointer-events: none;
            transform: rotate(-5deg);
        }

        body::after {
            content: "🍃 🐝 🌼";
            font-size: 4rem;
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
            pointer-events: none;
            transform: scaleX(-1);
        }

        .main-card {
            background-color: rgba(255, 255, 250, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            padding: 25px 30px 35px;
            box-shadow: 0 20px 40px rgba(30, 80, 40, 0.4);
            max-width: 1400px;
            width: 100%;
            border: 3px solid #b1dba0;
            margin-bottom: 25px;
        }

        .title-section {
            text-align: center;
            margin-bottom: 15px;
        }
        .main-title {
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            font-size: 26px;
            font-weight: 600;
            color: #1d5e3a;
            letter-spacing: 1px;
        }
        .team-title {
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            font-size: 14px;
            color: #2b6d42;
            margin-top: 6px;
        }

        .type-switch {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0 20px;
            flex-wrap: wrap;
        }
        .type-btn {
            background: #e0f0d6;
            border: 2px solid #7fb873;
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            color: #2a6b3c;
            transition: all 0.2s;
        }
        .type-btn.active {
            background: #2d6a4f;
            color: white;
            border-color: #1e4a2e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .type-btn:hover:not(.active) {
            background: #c4e0b8;
        }

        .controller {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 25px;
        }

        .btn {
            border: none;
            background: #ebffe7;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 56px;
            box-shadow: 0 6px 0 #2d6a4f;
            color: #154f32;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid #9ace8f;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1b6e3a;
        }

        .btn:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            pointer-events: none;
        }

        .btn-speak {
            background: #fff0d6;
            box-shadow: 0 6px 0 #c29b4a;
            color: #8a5a2b;
        }

        .btn-answer {
            background: #fef7cf;
            box-shadow: 0 6px 0 #bd9644;
            color: #5e461f;
        }

        .status {
            background: #daf5d0;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            color: #155830;
            border: 3px solid #7fb873;
            text-align: center;
            margin: 15px 0 25px;
            font-weight: 500;
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px 28px;
            margin: 20px 0;
        }
        .question-card {
            background: #fefef7;
            border-radius: 28px;
            padding: 18px 12px 80px;
            text-align: center;
            box-shadow: 0 10px 18px rgba(70, 90, 40, 0.2);
            border: 2px solid #c6e0b4;
            position: relative;
        }
        .question-text {
            font-size: 1.9rem;
            font-weight: 700;
            color: #1f543a;
            background: #ecfbe4;
            display: inline-block;
            padding: 8px 18px;
            border-radius: 60px;
            font-family: monospace;
        }
        .answer-hint {
            margin-top: 18px;
            font-size: 1.2rem;
            display: none;
        }
        .answer-hint.show {
            display: block;
        }
        .answer-value {
            font-weight: 800;
            font-size: 1.5rem;
            color: #d4410e;
            background: #fff2e0;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 40px;
        }

        .footer {
            text-align: center;
            font-size: 1rem;
            color: #1b6133;
            background: #e0f0d6;
            padding: 10px 20px;
            border-radius: 40px;
            margin-top: 20px;
            border: 2px solid #6b9f62;
            width: fit-content;
            align-self: center;
        }

        @media (max-width: 900px) {
            .questions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .question-text { font-size: 1.5rem; }
        }
        @media (max-width: 550px) {
            .questions-grid { grid-template-columns: 1fr; }
            .type-btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="title-section">
        <div class="main-title">📚 三年级笔算除法听算训练</div>
        <div class="team-title">数智赋能小学生WEB听觉作业设计团队</div>
    </div>

    <div class="type-switch">
        <button class="type-btn active" data-type="nozero">📘 商无0</button>
        <button class="type-btn" data-type="midzero">🔢 商中间有0</button>
        <button class="type-btn" data-type="endzero">🔚 商末尾有0</button>
    </div>

    <div class="controller">
        <button class="btn btn-speak" id="playBtn">▶ 开始朗读</button>
        <button class="btn" id="pauseBtn">⏸️ 暂停</button>
        <button class="btn btn-answer" id="answerBtn">🔍 显示答案</button>
    </div>

    <div class="status" id="statusMessage">
        💬 选择题型后点击「开始朗读」听算 | 语音只读算式（被除数÷除数=？），答案由你自己计算
    </div>

    <div id="questionsContainer" class="questions-grid"></div>
</div>
<div class="footer">✨ 每道题均可能有余数，朗读时仅播报题目，答案手动显示 ✨</div>

<script>
    (function() {
        // ==================== 全局配置 ====================
        const SPEAK_RATE = 0.65;
        const PAUSE_BETWEEN_REPEATS = 600;
        const PAUSE_AFTER_QUESTION = 2000;

        const TYPE_NOZERO = 'nozero';    
        const TYPE_MIDZERO = 'midzero';  
        const TYPE_ENDZERO = 'endzero';  

        let currentType = TYPE_NOZERO;
        let questions = [];
        let answersVisible = false;

        let isSpeaking = false;
        let currentQueueIndex = 0;
        let speakQueue = [];
        let timeoutId = null;
        let currentUtterance = null;

        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const answerBtn = document.getElementById('answerBtn');
        const statusMsg = document.getElementById('statusMessage');
        const questionsContainer = document.getElementById('questionsContainer');
        const typeBtns = document.querySelectorAll('.type-btn');

        // ========== 辅助函数 ==========
        function hasZeroDigit(num) {
            return num.toString().includes('0');
        }
        
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 获取余数（保证余数小于除数，70%概率有余数）
        function getRemainder(divisor) {
            const hasRem = Math.random() < 0.7;
            if (hasRem && divisor > 1) {
                return getRandomInt(1, divisor - 1);
            }
            return 0;
        }

        function isValidDividend(dividend) {
            if (dividend < 100 || dividend > 999) return false;
            // 被除数不含数字0，保持整洁
            if (hasZeroDigit(dividend)) return false;
            return true;
        }

        // ==================== 优化的题型生成（确保快速找到有效题目，避免死循环）====================
        
        // 题型1: 商无0（百、十、个位均非0）
        function generateNoZeroWithRemainder() {
            for (let attempt = 0; attempt < 200; attempt++) {
                const divisor = getRandomInt(2, 9);
                // 商的每一位都是1-9
                const h = getRandomInt(1, 9);
                const t = getRandomInt(1, 9);
                const u = getRandomInt(1, 9);
                const quotient = h * 100 + t * 10 + u;
                if (quotient < 100 || quotient > 999) continue;
                const remainder = getRemainder(divisor);
                const dividend = divisor * quotient + remainder;
                if (dividend >= 100 && dividend <= 999 && !hasZeroDigit(dividend)) {
                    return { dividend, divisor, quotient, remainder };
                }
            }
            // 保底题目（经典无0除法）
            return { dividend: 396, divisor: 3, quotient: 132, remainder: 0 };
        }

        // 题型2: 商中间有0（十位为0，百位和个位非0）
        function generateMidZeroWithRemainder() {
            for (let attempt = 0; attempt < 200; attempt++) {
                const divisor = getRandomInt(2, 9);
                const h = getRandomInt(1, 9);
                const u = getRandomInt(1, 9);
                const quotient = h * 100 + u;  // 十位为0
                if (quotient < 100 || quotient > 999) continue;
                const remainder = getRemainder(divisor);
                const dividend = divisor * quotient + remainder;
                if (dividend >= 100 && dividend <= 999 && !hasZeroDigit(dividend)) {
                    return { dividend, divisor, quotient, remainder };
                }
            }
            return { dividend: 408, divisor: 4, quotient: 102, remainder: 0 };
        }

        // 题型3: 商末尾有0（个位为0，百位和十位非0）—— 优化算法，大幅提升生成效率
        function generateEndZeroWithRemainder() {
            for (let attempt = 0; attempt < 250; attempt++) {
                const divisor = getRandomInt(2, 9);
                // 百位1-9，十位1-9，个位固定0
                const h = getRandomInt(1, 9);
                const t = getRandomInt(1, 9);
                const quotient = h * 100 + t * 10;  // 末尾为0
                if (quotient < 100 || quotient > 999) continue;
                
                const remainder = getRemainder(divisor);
                const dividend = divisor * quotient + remainder;
                
                // 验证被除数范围且不含0
                if (dividend >= 100 && dividend <= 999 && !hasZeroDigit(dividend)) {
                    return { dividend, divisor, quotient, remainder };
                }
            }
            
            // 备用方案：使用预先准备的优质末尾有0题目（确保切换时不会卡死）
            const fallbackQuestions = [
                { dividend: 360, divisor: 3, quotient: 120, remainder: 0 },
                { dividend: 480, divisor: 4, quotient: 120, remainder: 0 },
                { dividend: 540, divisor: 5, quotient: 108, remainder: 0 },
                { dividend: 720, divisor: 6, quotient: 120, remainder: 0 },
                { dividend: 560, divisor: 7, quotient: 80, remainder: 0 },
                { dividend: 640, divisor: 8, quotient: 80, remainder: 0 },
                { dividend: 810, divisor: 9, quotient: 90, remainder: 0 },
                { dividend: 270, divisor: 3, quotient: 90, remainder: 0 },
                { dividend: 450, divisor: 5, quotient: 90, remainder: 0 },
                { dividend: 630, divisor: 7, quotient: 90, remainder: 0 }
            ];
            const randomIndex = Math.floor(Math.random() * fallbackQuestions.length);
            const fb = fallbackQuestions[randomIndex];
            // 可能添加余数让题目更丰富
            const divisor = fb.divisor;
            const remainder = getRemainder(divisor);
            const dividendWithRem = divisor * fb.quotient + remainder;
            if (dividendWithRem >= 100 && dividendWithRem <= 999 && !hasZeroDigit(dividendWithRem)) {
                return { dividend: dividendWithRem, divisor: fb.divisor, quotient: fb.quotient, remainder: remainder };
            }
            return { dividend: 360, divisor: 3, quotient: 120, remainder: 1 };
        }

        // 生成16道不重复题目（优化去重逻辑，确保快速完成）
        function generateQuestionsByType() {
            const total = 16;
            const qs = [];
            const keySet = new Set();
            let maxAttempts = 500;
            let attempts = 0;
            
            while (qs.length < total && attempts < maxAttempts) {
                let q;
                if (currentType === TYPE_NOZERO) {
                    q = generateNoZeroWithRemainder();
                } else if (currentType === TYPE_MIDZERO) {
                    q = generateMidZeroWithRemainder();
                } else {
                    q = generateEndZeroWithRemainder();
                }
                
                const key = `${q.dividend}|${q.divisor}|${q.remainder}`;
                if (!keySet.has(key) && q.dividend >= 100 && q.dividend <= 999) {
                    keySet.add(key);
                    qs.push(q);
                }
                attempts++;
            }
            
            // 如果还不够16道，用保底题目补全
            if (qs.length < total) {
                const fallbackPool = getFallbackPool();
                for (let i = qs.length; i < total && i - qs.length < fallbackPool.length; i++) {
                    const fb = fallbackPool[(i - qs.length) % fallbackPool.length];
                    const key = `${fb.dividend}|${fb.divisor}|${fb.remainder}`;
                    if (!keySet.has(key)) {
                        qs.push(fb);
                        keySet.add(key);
                    }
                }
            }
            
            return qs.slice(0, total);
        }
        
        // 各类题型的保底题库（确保任何时候都能快速显示）
        function getFallbackPool() {
            if (currentType === TYPE_NOZERO) {
                return [
                    { dividend: 396, divisor: 3, quotient: 132, remainder: 0 },
                    { dividend: 486, divisor: 3, quotient: 162, remainder: 0 },
                    { dividend: 568, divisor: 4, quotient: 142, remainder: 0 },
                    { dividend: 672, divisor: 6, quotient: 112, remainder: 0 },
                    { dividend: 765, divisor: 5, quotient: 153, remainder: 0 },
                    { dividend: 846, divisor: 6, quotient: 141, remainder: 0 },
                    { dividend: 918, divisor: 9, quotient: 102, remainder: 0 },
                    { dividend: 279, divisor: 3, quotient: 93, remainder: 0 },
                    { dividend: 384, divisor: 4, quotient: 96, remainder: 0 },
                    { dividend: 576, divisor: 6, quotient: 96, remainder: 0 }
                ];
            } else if (currentType === TYPE_MIDZERO) {
                return [
                    { dividend: 408, divisor: 4, quotient: 102, remainder: 0 },
                    { dividend: 609, divisor: 3, quotient: 203, remainder: 0 },
                    { dividend: 804, divisor: 4, quotient: 201, remainder: 0 },
                    { dividend: 507, divisor: 3, quotient: 169, remainder: 0 },
                    { dividend: 702, divisor: 6, quotient: 117, remainder: 0 },
                    { dividend: 906, divisor: 3, quotient: 302, remainder: 0 },
                    { dividend: 405, divisor: 5, quotient: 81, remainder: 0 },
                    { dividend: 804, divisor: 2, quotient: 402, remainder: 0 }
                ];
            } else {
                // 商末尾有0 保底题库（确保流畅）
                return [
                    { dividend: 360, divisor: 3, quotient: 120, remainder: 0 },
                    { dividend: 480, divisor: 4, quotient: 120, remainder: 0 },
                    { dividend: 540, divisor: 5, quotient: 108, remainder: 0 },
                    { dividend: 720, divisor: 6, quotient: 120, remainder: 0 },
                    { dividend: 560, divisor: 7, quotient: 80, remainder: 0 },
                    { dividend: 640, divisor: 8, quotient: 80, remainder: 0 },
                    { dividend: 810, divisor: 9, quotient: 90, remainder: 0 },
                    { dividend: 270, divisor: 3, quotient: 90, remainder: 0 },
                    { dividend: 450, divisor: 5, quotient: 90, remainder: 0 },
                    { dividend: 630, divisor: 7, quotient: 90, remainder: 0 },
                    { dividend: 720, divisor: 8, quotient: 90, remainder: 0 },
                    { dividend: 280, divisor: 4, quotient: 70, remainder: 0 },
                    { dividend: 320, divisor: 4, quotient: 80, remainder: 0 },
                    { dividend: 490, divisor: 7, quotient: 70, remainder: 0 },
                    { dividend: 540, divisor: 6, quotient: 90, remainder: 0 }
                ];
            }
        }

        function getTypeName() {
            if (currentType === TYPE_NOZERO) return '商无0 (每位非0，可带余数)';
            if (currentType === TYPE_MIDZERO) return '商中间有0 (如102，可带余数)';
            return '商末尾有0 (如120，可带余数)';
        }

        // 停止所有朗读
        function stopSpeakingImmediately() {
            if (window.speechSynthesis) {
                try {
                    window.speechSynthesis.cancel();
                } catch(e) { console.warn(e); }
            }
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            isSpeaking = false;
            currentQueueIndex = 0;
            speakQueue = [];
            if (currentUtterance) currentUtterance = null;
            playBtn.disabled = false;
            playBtn.textContent = '▶ 开始朗读';
            pauseBtn.disabled = true;
        }

        function refreshQuestions() {
            stopSpeakingImmediately();
            questions = generateQuestionsByType();
            answersVisible = false;
            answerBtn.textContent = '🔍 显示答案';
            renderQuestionsGrid();
            statusMsg.innerHTML = `📋 已生成16道「${getTypeName()}」三位数÷一位数（可能含余数）| 朗读只读算式，每道读2遍`;
        }

        function renderQuestionsGrid() {
            if (!questions.length) return;
            let html = '';
            questions.forEach((q, idx) => {
                const remainderText = q.remainder > 0 ? ` 余 ${q.remainder}` : '';
                const answerDisplay = `${q.quotient}${remainderText}`;
                const answerHtml = `<div class="answer-hint" data-idx="${idx}"><div class="answer-value">${answerDisplay}</div></div>`;
                html += `
                    <div class="question-card">
                        <div class="question-text">${q.dividend} ÷ ${q.divisor} = ?</div>
                        ${answerHtml}
                    </div>
                `;
            });
            questionsContainer.innerHTML = html;
            if (answersVisible) {
                document.querySelectorAll('.answer-hint').forEach(el => el.classList.add('show'));
            } else {
                document.querySelectorAll('.answer-hint').forEach(el => el.classList.remove('show'));
            }
        }

        function toggleAnswers() {
            if (!questions.length) refreshQuestions();
            answersVisible = !answersVisible;
            const hints = document.querySelectorAll('.answer-hint');
            if (answersVisible) {
                hints.forEach(el => el.classList.add('show'));
                answerBtn.textContent = '🔒 隐藏答案';
                statusMsg.innerHTML = '📖 答案已显示（含余数），可对照自评。';
            } else {
                hints.forEach(el => el.classList.remove('show'));
                answerBtn.textContent = '🔍 显示答案';
                statusMsg.innerHTML = '📝 答案已隐藏，点击「显示答案」可核对。';
            }
        }

        // ==================== 朗读模块（只读算式，不读答案）====================
        function buildSpeakText(question) {
            return `${question.dividend} 除以 ${question.divisor} 等于 多少`;
        }

        function buildSpeakQueue() {
            const queue = [];
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                const speakText = buildSpeakText(q);
                const questionPlain = `${q.dividend} ÷ ${q.divisor}`;
                queue.push({
                    text: speakText,
                    questionIndex: i,
                    repeatNum: 1,
                    questionText: questionPlain
                });
                queue.push({
                    text: speakText,
                    questionIndex: i,
                    repeatNum: 2,
                    questionText: questionPlain
                });
            }
            return queue;
        }

        function speakNextInQueue() {
            if (!isSpeaking) return;
            if (currentQueueIndex >= speakQueue.length) {
                statusMsg.innerHTML = '✅ 全部题目朗读完成！请点击「显示答案」核对计算结果。';
                playBtn.disabled = false;
                playBtn.textContent = '▶ 开始朗读';
                pauseBtn.disabled = true;
                isSpeaking = false;
                currentQueueIndex = 0;
                speakQueue = [];
                return;
            }

            const item = speakQueue[currentQueueIndex];
            const textToSpeak = item.text;
            const questionIdx = item.questionIndex;
            const repeatNum = item.repeatNum;

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'zh-CN';
            utterance.rate = SPEAK_RATE;
            currentUtterance = utterance;

            utterance.onstart = () => {
                const repeatHint = repeatNum === 1 ? '第1遍' : '第2遍';
                statusMsg.innerHTML = `🔊 第 ${questionIdx+1}/16 题 · ${repeatHint} : ${item.questionText} = ? (听算，不读答案)`;
            };
            utterance.onend = () => {
                currentQueueIndex++;
                const isLastItem = currentQueueIndex >= speakQueue.length;
                const isEndOfQuestion = (repeatNum === 2) || isLastItem;

                if (isEndOfQuestion && !isLastItem) {
                    timeoutId = setTimeout(() => {
                        speakNextInQueue();
                    }, PAUSE_AFTER_QUESTION);
                } else if (!isLastItem) {
                    timeoutId = setTimeout(() => {
                        speakNextInQueue();
                    }, PAUSE_BETWEEN_REPEATS);
                } else {
                    speakNextInQueue();
                }
            };
            utterance.onerror = (e) => {
                console.warn("语音错误", e);
                currentQueueIndex++;
                timeoutId = setTimeout(() => {
                    speakNextInQueue();
                }, 300);
            };
            window.speechSynthesis.speak(utterance);
        }

        function startSpeakingInternal() {
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (!questions.length) {
                refreshQuestions();
            }
            speakQueue = buildSpeakQueue();
            if (speakQueue.length === 0) return;

            currentQueueIndex = 0;
            isSpeaking = true;
            playBtn.disabled = true;
            playBtn.textContent = '⏸️ 朗读中...';
            pauseBtn.disabled = false;
            statusMsg.innerHTML = `🎧 开始听算「${getTypeName()}」${questions.length}道题，每道读2遍，只读算式（不带答案）`;
            speakNextInQueue();
        }

        function startSpeaking() {
            if (!questions.length) {
                refreshQuestions();
            }
            if (isSpeaking || (window.speechSynthesis && window.speechSynthesis.speaking)) {
                stopSpeakingImmediately();
                setTimeout(() => {
                    startSpeakingInternal();
                }, 100);
                return;
            }
            startSpeakingInternal();
        }

        function onPlayClick() {
            if (isSpeaking && window.speechSynthesis && window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
                pauseBtn.disabled = false;
                playBtn.disabled = true;
                playBtn.textContent = '⏸️ 朗读中...';
                statusMsg.innerHTML = '🔊 继续听算朗读...';
                return;
            }
            if (isSpeaking) {
                stopSpeakingImmediately();
                startSpeakingInternal();
            } else {
                startSpeaking();
            }
        }

        function onPauseClick() {
            if (!isSpeaking) {
                statusMsg.innerHTML = 'ℹ️ 当前没有朗读任务';
                return;
            }
            if (window.speechSynthesis && window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
                window.speechSynthesis.pause();
                pauseBtn.disabled = true;
                playBtn.disabled = false;
                playBtn.textContent = '▶ 开始朗读';
                statusMsg.innerHTML = '⏸️ 已暂停朗读';
            } else if (window.speechSynthesis && window.speechSynthesis.paused) {
                statusMsg.innerHTML = '⏸️ 已处于暂停状态';
            } else {
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
                isSpeaking = false;
                pauseBtn.disabled = true;
                playBtn.disabled = false;
                playBtn.textContent = '▶ 开始朗读';
                statusMsg.innerHTML = '⏸️ 已暂停';
            }
        }

        // ========== 题型切换（彻底清空，保证流畅） ==========
        function switchType(type) {
            if (type === currentType) return;
            currentType = type;
            
            typeBtns.forEach(btn => {
                if (btn.dataset.type === type) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // 关键：完全停止语音并清空所有队列
            stopSpeakingImmediately();
            
            // 重新生成题目
            questions = generateQuestionsByType();
            answersVisible = false;
            answerBtn.textContent = '🔍 显示答案';
            renderQuestionsGrid();
            
            let typeDesc = '';
            if (currentType === TYPE_NOZERO) typeDesc = '商无0（每位非0，可能有余数）';
            else if (currentType === TYPE_MIDZERO) typeDesc = '商中间有0（如102，可能有余数）';
            else typeDesc = '商末尾有0（如120，可能有余数）';
            statusMsg.innerHTML = `📖 已切换到「${typeDesc}」题型，共16道题（含余数）。点击「开始朗读」听算。`;
        }

        // ========== 初始化 ==========
        function init() {
            questions = generateQuestionsByType();
            renderQuestionsGrid();
            pauseBtn.disabled = true;

            playBtn.addEventListener('click', onPlayClick);
            pauseBtn.addEventListener('click', onPauseClick);
            answerBtn.addEventListener('click', toggleAnswers);

            typeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    switchType(btn.dataset.type);
                });
            });
        }

        init();
    })();
</script>
</body>
</html>
