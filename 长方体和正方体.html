    // 辅助函数：随机抽取3~5道题型不同的题目
    function getDiverseQuestions(bank, targetCount) {
        if (targetCount <= 0) return [];
        const typeMap = new Map();
        bank.forEach(q => {
            const type = q.type || "其他";
            if (!typeMap.has(type)) typeMap.set(type, []);
            typeMap.get(type).push(q);
        });
        const types = Array.from(typeMap.keys());
        let selected = [];
        let attempts = 0;
        while (selected.length < targetCount && attempts < 50) {
            const shuffledTypes = [...types];
            for (let i = shuffledTypes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledTypes[i], shuffledTypes[j]] = [shuffledTypes[j], shuffledTypes[i]];
            }
            let candidate = [];
            for (let t of shuffledTypes) {
                if (candidate.length >= targetCount) break;
                const pool = typeMap.get(t);
                if (pool && pool.length) {
                    const available = pool.filter(item => !candidate.includes(item) && !selected.includes(item));
                    if (available.length) {
                        const rand = Math.floor(Math.random() * available.length);
                        candidate.push(available[rand]);
                    }
                }
            }
            if (candidate.length) selected = candidate.slice(0, targetCount);
            attempts++;
        }
        if (selected.length < targetCount) {
            const remaining = bank.filter(q => !selected.includes(q));
            const need = targetCount - selected.length;
            for (let i = 0; i < need && i < remaining.length; i++) selected.push(remaining[i]);
        }
        for (let i = selected.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [selected[i], selected[j]] = [selected[j], selected[i]];
        }
        return selected;
    }

    function getRandomCount() {
        return Math.floor(Math.random() * 3) + 3;
    }

    // ========== 朗读控制器（支持随时下一题，语速0.8，遍间隔2秒） ==========
    class ReadingController {
        constructor() {
            this.active = false;
            this.timeouts = [];
            this.currentQuestions = [];
            this.currentIndex = 0;
            this.onProgress = null;
            this.onFinished = null;
        }

        clear() {
            this.active = false;
            this.timeouts.forEach(t => clearTimeout(t));
            this.timeouts = [];
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        }

        speakRepeated(text, repeatCount, pauseSec, onFinish) {
            let repeatIndex = 0;
            const speakNext = () => {
                if (!this.active) {
                    if (onFinish) onFinish();
                    return;
                }
                if (repeatIndex >= repeatCount) {
                    if (onFinish) onFinish();
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;  // 语速0.8
                utterance.lang = "zh-CN";
                utterance.onend = () => {
                    repeatIndex++;
                    if (repeatIndex < repeatCount && this.active) {
                        const tid = setTimeout(speakNext, pauseSec * 1000);
                        this.timeouts.push(tid);
                    } else if (repeatIndex >= repeatCount && this.active) {
                        if (onFinish) onFinish();
                    }
                };
                window.speechSynthesis.speak(utterance);
            };
            speakNext();
        }

        start(questions) {
            this.clear();
            if (!questions.length) return;
            this.active = true;
            this.currentQuestions = questions;
            this.currentIndex = 0;
            this.readNext();
        }

        readNext() {
            if (!this.active) return;
            if (this.currentIndex >= this.currentQuestions.length) {
                if (this.onFinished) this.onFinished();
                this.active = false;
                return;
            }
            const q = this.currentQuestions[this.currentIndex];
            const fullText = `第${this.currentIndex+1}题，${q.text}`;
            if (this.onProgress) {
                this.onProgress(this.currentIndex + 1, this.currentQuestions.length);
            }
            // 每遍间隔2秒
            this.speakRepeated(fullText, 3, 2, () => {
                if (!this.active) return;
                // 本题读完，不做自动下一题，等待用户点击下一题按钮
            });
        }

        // 立即跳到下一题（无论当前是否正在朗读）
        next() {
            if (!this.active) return false;
            // 停止当前朗读
            this.clear();
            // 如果已经是最后一题，结束
            if (this.currentIndex + 1 >= this.currentQuestions.length) {
                this.active = false;
                if (this.onFinished) this.onFinished();
                return true;
            }
            // 移到下一题
            this.currentIndex++;
            // 重新激活并开始朗读下一题
            this.active = true;
            this.readNext();
            return true;
        }
    }

    // ========== 辅助函数：生成详细答案说明 ==========
    function getAnswerDetail(q) {
        const text = q.text;
        const answer = q.answer;
        const type = q.type;
        if (type === "计算" || type === "逆向" || type === "实际" || type === "转换") {
            if (text.includes("棱长总和") || text.includes("棱长和")) {
                return "💡 公式：长方体棱长和 = (长+宽+高)×4；正方体棱长和 = 棱长×12";
            }
            if (text.includes("表面积")) {
                if (text.includes("无盖")) return "💡 无盖表面积 = 长×宽 + 2×(长×高+宽×高)";
                if (text.includes("粉刷") || text.includes("贴瓷砖")) return "💡 粉刷面积 = 四周墙壁 + 天花板 - 门窗";
                return "💡 长方体表面积 = 2×(长×宽 + 长×高 + 宽×高)；正方体表面积 = 棱长×棱长×6";
            }
            if (text.includes("体积") || text.includes("容积")) {
                if (text.includes("上升") || text.includes("放入")) return "💡 浸没物体体积 = 底面积 × 水面上升高度";
                if (text.includes("熔铸")) return "💡 熔铸前后体积不变";
                return "💡 长方体体积 = 长×宽×高；正方体体积 = 棱长³；容积 = 内尺寸长×宽×高";
            }
            if (text.includes("棱长") && text.includes("多少")) return "💡 棱长 = 棱长总和 ÷ 12（正方体）";
            if (text.includes("高是多少")) return "💡 利用公式逆推";
        }
        if (type === "概念") {
            return "💡 基础概念，请记牢";
        }
        if (type.includes("融合")) {
            return "💡 综合应用，需灵活运用公式";
        }
        return "💡 仔细分析，运用公式计算";
    }

    function renderOverview() {
        const container = document.getElementById('boardsContainer');

            const card = document.createElement('div');

        const panel = document.createElement('div');
        panel.className = 'listen-panel';
        const badgeText = mod.bank.length === 150 ? '融合150题' : '题库30题';
        
        // 答案区域
        let answersHtml = '';
        if (showAnswers) {
            answersHtml = `<div class="info-section" id="answerSection">
                <div style="font-weight:600; margin-bottom:8px;">📝 题目与答案对照（含解析）</div>`;
            questions.forEach((q, idx) => {
                const detail = getAnswerDetail(q);
                answersHtml += `<div class="info-item">
                    <div class="info-question">${idx+1}. ${q.text}</div>
                    <div class="info-value">✅ 答案：${q.answer}</div>
                    <div class="info-detail">${detail}</div>
                </div>`;
            });
            answersHtml += `</div>`;
        } else {
            answersHtml = `<div class="info-section no-info" id="answerSection">🔒 答案未显示，点击「出示答案」核对（含解析）</div>`;
        }
        
        // 题目区域
        const questionSectionHtml = `<div class="info-section clickable-card" id="questionSection" style="cursor:pointer;">
            <div style="text-align:center; padding:12px;">📖 点击出示题目（查看原文）</div>
        </div>`;

        panel.innerHTML = `
            <div class="listen-header">
                <h2>${mod.icon} ${mod.name}</h2>
                <span class="badge">${badgeText} | 当前${questions.length}题</span>
            </div>
            <div class="question-list">
                <div style="font-weight:500;">📌 题号列表（题目隐藏，请听语音）</div>
                <div class="num-badge-list">
                    ${questions.map((_, i) => `<span class="num-badge">第${i+1}题</span>`).join('')}
                </div>
                <div class="progress-area" id="progressArea">
                    ⏳ 点击「开始朗读」启动听算（语速0.8，每题3遍，每遍间隔2秒）
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="startSpeakBtn">🔊 开始朗读</button>
                <button class="btn btn-next" id="nextBtn">⏩ 下一题</button>
                <button class="btn btn-secondary" id="refreshBtn">🔄 换一组</button>
                <button class="btn btn-success" id="showAnswerBtn">📋 出示答案</button>
                <button class="btn" id="backBtn">⬅️ 返回板块</button>
            </div>
            ${answersHtml}
            ${questionSectionHtml}
        `;
        container.appendChild(panel);

        // 获取DOM元素
        const startBtn = document.getElementById('startSpeakBtn');
        const nextBtn = document.getElementById('nextBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const answerBtn = document.getElementById('showAnswerBtn');
        const backBtn = document.getElementById('backBtn');
        const progressDiv = document.getElementById('progressArea');

        // 创建新的控制器
        if (currentController) currentController.clear();
        const controller = new ReadingController();
        currentController = controller;

        // 设置回调
        controller.onProgress = (current, total) => {
            progressDiv.innerHTML = `🔊 正在朗读第 ${current} / ${total} 题（每题3遍，每遍间隔2秒，语速0.8）...<br>点击「下一题」可立即跳转`;
        };
        controller.onFinished = () => {
            progressDiv.innerHTML = `🎉 所有题目朗读完毕！`;
            startBtn.disabled = false;
        };

        // 开始朗读
        startBtn.addEventListener('click', () => {
            if (controller.active) {
                controller.clear();
            }
            startBtn.disabled = true;
            progressDiv.innerHTML = `⏳ 准备朗读...`;
            controller.start(questions);
        });

        // 下一题：始终可点，直接调用控制器的next方法
        nextBtn.addEventListener('click', () => {
            if (!controller.active) {
                progressDiv.innerHTML = `⚠️ 请先点击「开始朗读」`;
                return;
            }
            controller.next();
        });

        // 换一组
        refreshBtn.addEventListener('click', () => {
            controller.clear();
            const newCount = getRandomCount();
            const newQuestions = getDiverseQuestions(mod.bank, newCount);
            renderListenMode(moduleIdx, newQuestions, false);
        });

        // 出示答案
        answerBtn.addEventListener('click', () => {
            controller.clear();
            renderListenMode(moduleIdx, questions, true);
        });

        // 返回板块
        backBtn.addEventListener('click', () => {
            controller.clear();
            activeModuleIndex = null;
            currentController = null;
            renderOverview();
        });

        // 题目区域点击显示题目原文
        const questionDiv = document.getElementById('questionSection');
        let shown = false;
        questionDiv.addEventListener('click', () => {
            if (shown) return;
            shown = true;
            let html = `<div style="font-weight:600; margin-bottom:8px;">📖 题目原文（共${questions.length}题）</div>`;
            questions.forEach((q, idx) => {
                html += `<div class="info-item"><div class="info-question">${idx+1}. ${q.text}</div></div>`;
            });
            questionDiv.innerHTML = html;
            questionDiv.style.cursor = 'default';
        });
    }

    // 初始渲染
    renderOverview();
</script>
</body>
</html>
