<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小数听算练习</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f0fa 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 2px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 28px 32px 42px;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .research-team {
            font-size: 0.85rem;
            color: #2c5a7a;
            background: #eef4fa;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-top: 6px;
            margin-bottom: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid #cde0f0;
        }

        .sub {
            color: #2c5a7a;
            border-left: 5px solid #2a9d8f;
            padding-left: 16px;
            font-weight: 500;
            margin-bottom: 28px;
            font-size: 0.95rem;
            background: #eef4fa80;
            border-radius: 20px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            justify-content: center;
        }

        button {
            background: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        button i {
            font-style: normal;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .btn-primary {
            background: #2a9d8f;
            color: white;
            box-shadow: 0 8px 18px rgba(42, 157, 143, 0.3);
        }
        .btn-primary:hover {
            background: #21867a;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e9c46a;
            color: #3b2e1e;
        }
        .btn-secondary:hover {
            background: #e0b84d;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #e76f51;
            color: white;
        }
        .btn-danger:hover {
            background: #d15a3a;
        }
        button:active {
            transform: translateY(1px);
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 22px;
            margin: 28px 0 20px;
        }

        .question-item {
            background: #fff;
            border-radius: 32px;
            padding: 20px 20px 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            border: 1px solid #eef2f5;
        }

        .q-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .q-num {
            background: #2a9d8f20;
            border-radius: 40px;
            padding: 4px 12px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #2a9d8f;
        }
        .q-type {
            font-size: 0.7rem;
            background: #eef2fa;
            padding: 3px 10px;
            border-radius: 30px;
            color: #4a627a;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 12px 0 10px;
            color: #1e3c5c;
            line-height: 1.4;
            word-break: break-word;
        }

        .fraction-bridge {
            background: #fef9e6;
            padding: 8px 12px;
            border-radius: 20px;
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 0.85rem;
            color: #b45f2a;
            margin: 10px 0;
            border-left: 4px solid #f4a261;
        }

        .answer-area {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px dashed #cbdbe2;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .answer-label {
            font-size: 0.8rem;
            color: #4f6f8f;
        }
        .answer-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e6f5c;
            background: #e0f2e9;
            padding: 4px 12px;
            border-radius: 28px;
        }

        .status {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            background: #eef2fa;
            padding: 10px;
            border-radius: 60px;
            color: #2c5a7a;
        }

        footer {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 35px;
            color: #6c8eae;
        }

        @media (max-width: 700px) {
            .card { padding: 20px; }
            .question-text { font-size: 1.1rem; }
            .questions-grid { grid-template-columns: 1fr; }
            button { padding: 8px 18px; font-size: 0.9rem; }
        }
        .speaking {
            background: #f4e3b1;
            transition: 0.1s;
            box-shadow: 0 0 0 2px #f4a261;
        }
    </style>
</head>
<body>
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h1>🎧 小数听算练习   </h1>
        <div class="research-team">📖 数智赋能小学生WEB听觉作业设计研究团队</div>
    </div>
    <div class="sub">📐   </div>

    <div class="toolbar">
        <button id="generateBtn" class="btn-secondary">✨ 随机生成新题 </button>
        <button id="playBtn" class="btn-primary">🔊 开始听算 </button>
        <button id="stopBtn" class="btn-danger">⏹️ 停止朗读</button>
    </div>

    <div id="questionsContainer" class="questions-grid"></div>
    <div class="status" id="statusMsg">
        ✅ 已生成6道题目 ，点击“开始听算”语音朗读，每道题重复3遍，语速0.6，间隔2秒
    </div>
      
</div>

<script>
    // ========== 朗读核心：严格遵循数学读法 ==========
    function integerToChinese(num) {
        if (num === undefined || num === null) return '';
        const n = parseInt(num, 10);
        if (isNaN(n)) return String(num);
        
        if (n === 0) return '零';
        
        const digits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
        
        if (n < 10) return digits[n];
        if (n < 20) {
            if (n === 10) return '十';
            return '十' + digits[n % 10];
        }
        if (n < 100) {
            let tens = Math.floor(n / 10);
            let units = n % 10;
            if (units === 0) return digits[tens] + '十';
            return digits[tens] + '十' + digits[units];
        }
        if (n < 1000) {
            let hundreds = Math.floor(n / 100);
            let remainder = n % 100;
            if (remainder === 0) return digits[hundreds] + '百';
            if (remainder < 10) return digits[hundreds] + '百零' + integerToChinese(remainder);
            return digits[hundreds] + '百' + integerToChinese(remainder);
        }
        return n.toString();
    }
    
    function decimalPartToChinese(decimalStr) {
        const digits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
        let result = '';
        for (let ch of decimalStr) {
            let digit = parseInt(ch, 10);
            if (!isNaN(digit)) {
                result += digits[digit];
            }
        }
        return result;
    }
    
    function decimalToChineseRead(decimalStr) {
        if (!decimalStr.includes('.')) return integerToChinese(parseInt(decimalStr, 10));
        
        let parts = decimalStr.split('.');
        let intPart = parts[0];
        let fracPart = parts[1];
        
        let intRead = (intPart === '0') ? '零' : integerToChinese(parseInt(intPart, 10));
        let fracRead = decimalPartToChinese(fracPart);
        
        if (fracRead === '') return intRead;
        return intRead + '点' + fracRead;
    }
    
    function buildNaturalSpeech(questionObj) {
        let rawText = questionObj.questionText;
        
        let processed = rawText.replace(/(\d+)(厘米)/g, (match, num, unit) => {
            return integerToChinese(parseInt(num, 10)) + unit;
        }).replace(/(\d+)(分米)/g, (match, num, unit) => {
            return integerToChinese(parseInt(num, 10)) + unit;
        }).replace(/(\d+)(角)/g, (match, num, unit) => {
            return integerToChinese(parseInt(num, 10)) + unit;
        }).replace(/(\d+)(分)/g, (match, num, unit) => {
            return integerToChinese(parseInt(num, 10)) + unit;
        });
        
        processed = processed.replace(/(?<![\.\d])(\d+)(?=[米元])/g, (match) => {
            return integerToChinese(parseInt(match, 10));
        });
        
        processed = processed.replace(/(\d+\.\d+)(米|元)?/g, (match, decimalNum, unit) => {
            let chineseDecimal = decimalToChineseRead(decimalNum);
            return chineseDecimal + (unit || '');
        });
        
        let finalText = processed.replace(/\?/g, '多少');
        finalText = finalText.replace(/= 多少/g, '等于多少');
        if (!finalText.includes('等于') && finalText.includes('多少')) {
            finalText = finalText.replace('多少', '等于多少');
        }
        
        return finalText;
    }
    
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    
    // ========== 修正后的题型定义（严格处理整数部分为0的情况）==========
    
    // 题型1: 复名数(米+厘米) -> 单名数米 (两位小数)
    function genLenM_CmToM() {
        let meters = getRandomInt(0, 8);
        let cm = getRandomInt(1, 99);
        if (meters === 0 && cm === 0) cm = 25;
        let decimalValue = meters + cm / 100;
        let finalDecimal = decimalValue.toFixed(2);
        let displayDecimal = parseFloat(finalDecimal).toString();
        if (!displayDecimal.includes('.')) displayDecimal = displayDecimal + '.0';
        else if (displayDecimal.split('.')[1].length === 1) displayDecimal = displayDecimal + '0';
        const questionText = `${meters}米${cm}厘米 = ? 米`;
        const answerText = `${displayDecimal} 米`;
        const fractionBridge = `${meters}米${cm}厘米 = ${meters}米 + ${cm}厘米 = ${meters} + ${cm}/100 米 = ${(meters + cm/100).toFixed(2)} 米 = ${displayDecimal} 米`;
        return { questionText, answerText, fractionBridge, type: 'length' };
    }
    
    // 题型2: 复名数(米+分米) -> 米 (一位小数)
    function genLenM_DmToM() {
        let meters = getRandomInt(0, 9);
        let dm = getRandomInt(1, 9);
        if (meters === 0 && dm === 0) dm = 5;
        let decimalVal = meters + dm / 10;
        let displayDecimal = decimalVal.toFixed(1).replace(/\.0$/, '');
        if (!displayDecimal.includes('.')) displayDecimal += '.0';
        const questionText = `${meters}米${dm}分米 = ? 米`;
        const answerText = `${displayDecimal} 米`;
        const fractionBridge = `${meters}米${dm}分米 = ${meters}米 + ${dm}分米 = ${meters} + ${dm}/10 米 = ${decimalVal.toFixed(1)} 米`;
        return { questionText, answerText, fractionBridge, type: 'length' };
    }
    
    // 题型3: 单名数米 -> 复名数（米+厘米 或 纯厘米）
    // 修正：当整数部分为0时，只显示“厘米”，不显示“0米”
    function genLenM_ToM_Cm() {
        let intPart = getRandomInt(0, 8);
        let centPart = getRandomInt(1, 99);
        let decimalValue = intPart + centPart / 100;
        let decimalStr = decimalValue.toFixed(2);
        
        let questionText, answerText, fractionBridge;
        
        if (intPart === 0) {
            // 0.xx米 = xx厘米 (不出现0米)
            questionText = `${decimalStr}米 = ? 厘米`;
            answerText = `${centPart}厘米`;
            fractionBridge = `${decimalStr}米 = ${centPart}/100米 = ${centPart}厘米`;
        } else {
            questionText = `${decimalStr}米 = ? 米 ? 厘米`;
            answerText = `${intPart}米${centPart}厘米`;
            fractionBridge = `${decimalStr}米 = ${intPart}米 + ${centPart}/100米 = ${intPart}米 + ${centPart}厘米 = ${intPart}米${centPart}厘米`;
        }
        return { questionText, answerText, fractionBridge, type: 'length' };
    }
    
    // 题型4: 单名数米 -> 复名数（米+分米 或 纯分米）
    function genLenM_ToM_Dm() {
        let intPart = getRandomInt(0, 9);
        let dmPart = getRandomInt(1, 9);
        let decimalVal = intPart + dmPart / 10;
        let displayDecimal = decimalVal.toFixed(1);
        
        let questionText, answerText, fractionBridge;
        
        if (intPart === 0) {
            // 0.x米 = x分米
            questionText = `${displayDecimal}米 = ? 分米`;
            answerText = `${dmPart}分米`;
            fractionBridge = `${displayDecimal}米 = ${dmPart}/10米 = ${dmPart}分米`;
        } else {
            questionText = `${displayDecimal}米 = ? 米 ? 分米`;
            answerText = `${intPart}米${dmPart}分米`;
            fractionBridge = `${displayDecimal}米 = ${intPart}米 + ${dmPart}/10米 = ${intPart}米 + ${dmPart}分米 = ${intPart}米${dmPart}分米`;
        }
        return { questionText, answerText, fractionBridge, type: 'length' };
    }
    
    // 题型5: 复名数(元角分) -> 元 (两位小数)
    function genMoneyYuanJfToYuan() {
        let yuan = getRandomInt(0, 15);
        let jiao = getRandomInt(0, 9);
        let fen = getRandomInt(0, 9);
        if (yuan === 0 && jiao === 0 && fen === 0) { jiao = 3; fen = 5; }
        let decimalValue = yuan + jiao / 10 + fen / 100;
        let displayFixed = decimalValue.toFixed(2);
        let displayDecimal = parseFloat(displayFixed).toString();
        if (!displayDecimal.includes('.')) displayDecimal = displayDecimal + '.00';
        else if (displayDecimal.split('.')[1].length === 1) displayDecimal = displayDecimal + '0';
        
        let questionText, fractionBridge;
        if (yuan === 0 && jiao === 0) {
            questionText = `${fen}分 = ? 元`;
            fractionBridge = `${fen}分 = ${fen}/100 元 = ${decimalValue.toFixed(2)} 元`;
        } else if (yuan === 0 && fen === 0) {
            questionText = `${jiao}角 = ? 元`;
            fractionBridge = `${jiao}角 = ${jiao}/10 元 = ${decimalValue.toFixed(2)} 元`;
        } else if (yuan === 0) {
            questionText = `${jiao}角${fen}分 = ? 元`;
            fractionBridge = `${jiao}角${fen}分 = ${jiao}/10 + ${fen}/100 元 = ${decimalValue.toFixed(2)} 元`;
        } else if (jiao === 0 && fen === 0) {
            questionText = `${yuan}元 = ? 元`;
            fractionBridge = `${yuan}元 = ${yuan} 元`;
        } else if (jiao === 0) {
            questionText = `${yuan}元${fen}分 = ? 元`;
            fractionBridge = `${yuan}元${fen}分 = ${yuan} + ${fen}/100 元 = ${decimalValue.toFixed(2)} 元`;
        } else if (fen === 0) {
            questionText = `${yuan}元${jiao}角 = ? 元`;
            fractionBridge = `${yuan}元${jiao}角 = ${yuan} + ${jiao}/10 元 = ${decimalValue.toFixed(2)} 元`;
        } else {
            questionText = `${yuan}元${jiao}角${fen}分 = ? 元`;
            fractionBridge = `${yuan}元${jiao}角${fen}分 = ${yuan} + ${jiao}/10 + ${fen}/100 元 = ${decimalValue.toFixed(2)} 元`;
        }
        
        const answerText = `${parseFloat(decimalValue).toFixed(2).replace(/\.?0+$/, '')} 元`;
        return { questionText, answerText, fractionBridge, type: 'money' };
    }
    
    // 题型6: 单名数元 -> 元角分 (严格处理整数部分为0的情况)
    function genMoneyYuanToYuanJf() {
        let decimalType = getRandomInt(0, 1); // 0: 一位小数(角), 1: 两位小数(角+分)
        let yuanInt = 0;
        let jiao = 0, fen = 0;
        let decimalValue = 0;
        
        // 决定是否出现整数部分为0的情况（约40%概率出现纯小数）
        let isPureDecimal = getRandomInt(0, 4) < 2; // 50%概率整数部分为0
        
        if (isPureDecimal) {
            yuanInt = 0;
            if (decimalType === 0) {
                jiao = getRandomInt(1, 9);
                decimalValue = jiao / 10;
            } else {
                jiao = getRandomInt(0, 9);
                fen = getRandomInt(1, 9);
                if (jiao === 0 && fen === 0) fen = 5;
                decimalValue = jiao / 10 + fen / 100;
            }
        } else {
            yuanInt = getRandomInt(1, 15);
            if (decimalType === 0) {
                jiao = getRandomInt(1, 9);
                decimalValue = yuanInt + jiao / 10;
            } else {
                jiao = getRandomInt(0, 9);
                fen = getRandomInt(1, 9);
                if (jiao === 0 && fen === 0) fen = 5;
                decimalValue = yuanInt + jiao / 10 + fen / 100;
            }
        }
        
        let decimalStr = decimalValue.toFixed(2).replace(/\.?0+$/, '');
        if (!decimalStr.includes('.')) decimalStr = decimalStr + '.0';
        
        let questionText, answerText, fractionBridge;
        
        if (yuanInt === 0) {
            // 整数部分为0：0.xx元 = x角x分 或 0.x元 = x角
            if (jiao === 0) {
                questionText = `${decimalStr}元 = ? 分`;
                answerText = `${fen}分`;
                fractionBridge = `${decimalStr}元 = ${fen}/100元 = ${fen}分`;
            } else if (fen === 0) {
                questionText = `${decimalStr}元 = ? 角`;
                answerText = `${jiao}角`;
                fractionBridge = `${decimalStr}元 = ${jiao}/10元 = ${jiao}角`;
            } else {
                questionText = `${decimalStr}元 = ? 角 ? 分`;
                answerText = `${jiao}角${fen}分`;
                fractionBridge = `${decimalStr}元 = ${jiao}/10元 + ${fen}/100元 = ${jiao}角${fen}分`;
            }
        } else {
            // 整数部分不为0
            if (jiao === 0 && fen === 0) {
                questionText = `${decimalStr}元 = ? 元`;
                answerText = `${yuanInt}元`;
                fractionBridge = `${decimalStr}元 = ${yuanInt}元`;
            } else if (jiao === 0) {
                questionText = `${decimalStr}元 = ? 元 ? 分`;
                answerText = `${yuanInt}元${fen}分`;
                fractionBridge = `${decimalStr}元 = ${yuanInt}元 + ${fen}/100元 = ${yuanInt}元${fen}分`;
            } else if (fen === 0) {
                questionText = `${decimalStr}元 = ? 元 ? 角`;
                answerText = `${yuanInt}元${jiao}角`;
                fractionBridge = `${decimalStr}元 = ${yuanInt}元 + ${jiao}/10元 = ${yuanInt}元${jiao}角`;
            } else {
                questionText = `${decimalStr}元 = ? 元 ? 角 ? 分`;
                answerText = `${yuanInt}元${jiao}角${fen}分`;
                fractionBridge = `${decimalStr}元 = ${yuanInt}元 + ${jiao}/10元 + ${fen}/100元 = ${yuanInt}元${jiao}角${fen}分`;
            }
        }
        
        return { questionText, answerText, fractionBridge, type: 'money' };
    }
    
    function getRandomLengthQuestion() {
        const lenTypes = [genLenM_CmToM, genLenM_DmToM, genLenM_ToM_Cm, genLenM_ToM_Dm];
        const idx = getRandomInt(0, lenTypes.length - 1);
        return lenTypes[idx]();
    }
    
    function getRandomMoneyQuestion() {
        const moneyTypes = [genMoneyYuanJfToYuan, genMoneyYuanToYuanJf];
        const idx = getRandomInt(0, moneyTypes.length - 1);
        return moneyTypes[idx]();
    }
    
    function generateQuestionSet() {
        let questions = [];
        for (let i = 0; i < 3; i++) questions.push(getRandomLengthQuestion());
        for (let i = 0; i < 3; i++) questions.push(getRandomMoneyQuestion());
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
        return questions;
    }
    
    // ========== 渲染与语音播放 ==========
    let currentQuestions = [];
    let speechQueueActive = false;
    let stopRequested = false;
    
    function renderQuestions(questions) {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        questions.forEach((q, idx) => {
            const typeLabel = q.type === 'length' ? '📏 长度换算' : '💰 货币换算';
            const card = document.createElement('div');
            card.className = 'question-item';
            card.setAttribute('data-idx', idx);
            card.innerHTML = `
                <div class="q-header">
                    <span class="q-num">第 ${idx+1} 题</span>
                    <span class="q-type">${typeLabel}</span>
                </div>
                <div class="question-text">${q.questionText}</div>
                <div class="fraction-bridge">📐 分数桥：${q.fractionBridge}</div>
                <div class="answer-area">
                    <span class="answer-label">✓ 答案：</span>
                    <span class="answer-value">${q.answerText}</span>
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    async function speakTextPromise(text, rate = 0.6) {
        return new Promise((resolve, reject) => {
            if (stopRequested) {
                reject(new Error('停止朗读'));
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = rate;
            utterance.pitch = 1.0;
            utterance.volume = 1;
            utterance.onend = () => resolve();
            utterance.onerror = (err) => reject(err);
            window.speechSynthesis.speak(utterance);
        });
    }
    
    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    function clearHighlight() {
        const cards = document.querySelectorAll('.question-item');
        cards.forEach(card => card.classList.remove('speaking'));
    }
    
    function highlightQuestion(index) {
        clearHighlight();
        const cards = document.querySelectorAll('.question-item');
        if (cards[index]) cards[index].classList.add('speaking');
    }
    
    async function playAllQuestions(questions) {
        if (!questions.length) return;
        stopRequested = false;
        const statusDiv = document.getElementById('statusMsg');
        for (let i = 0; i < questions.length; i++) {
            if (stopRequested) break;
            const q = questions[i];
            const naturalSpeech = buildNaturalSpeech(q);
            highlightQuestion(i);
            statusDiv.innerHTML = `🔊 正在朗读第 ${i+1}/${questions.length} 题：“${q.questionText}”，重复3遍...`;
            for (let repeat = 1; repeat <= 3; repeat++) {
                if (stopRequested) break;
                if (repeat > 1) await delay(420);
                if (stopRequested) break;
                try {
                    await speakTextPromise(naturalSpeech, 0.6);
                } catch(e) { if(!stopRequested) console.warn(e); }
            }
            if (stopRequested) break;
            if (i !== questions.length - 1 && !stopRequested) {
                statusDiv.innerHTML = `⏳ 第 ${i+1} 题完成，间隔2秒后下一题...`;
                await delay(2000);
            }
        }
        if (!stopRequested) {
            statusDiv.innerHTML = '🎉 听算练习完成！可重新生成题目或再次听算 🎉';
            clearHighlight();
        } else {
            statusDiv.innerHTML = '⏹️ 朗读已停止。';
            clearHighlight();
        }
        speechQueueActive = false;
    }
    
    async function startListening() {
        if (!currentQuestions.length) {
            document.getElementById('statusMsg').innerHTML = '⚠️ 请先生成题目，再开始听算。';
            return;
        }
        if (speechQueueActive) {
            stopSpeaking();
            await delay(200);
        }
        stopRequested = false;
        speechQueueActive = true;
        window.speechSynthesis.cancel();
        await playAllQuestions(currentQuestions);
        speechQueueActive = false;
    }
    
    function stopSpeaking() {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        stopRequested = true;
        speechQueueActive = false;
        clearHighlight();
        document.getElementById('statusMsg').innerHTML = '⏹️ 朗读已手动停止，可重新开始听算或生成新题。';
    }
    
    function regenerateAndRender() {
        if (speechQueueActive) stopSpeaking();
        currentQuestions = generateQuestionSet();
        renderQuestions(currentQuestions);
        document.getElementById('statusMsg').innerHTML = '✨ 已生成6道题目 (3长度+3货币)，点击“开始听算”语音朗读，每道题重复3遍，语速0.6，间隔2秒。';
        clearHighlight();
    }
    
    function init() {
        currentQuestions = generateQuestionSet();
        renderQuestions(currentQuestions);
        document.getElementById('generateBtn').addEventListener('click', regenerateAndRender);
        document.getElementById('playBtn').addEventListener('click', startListening);
        document.getElementById('stopBtn').addEventListener('click', stopSpeaking);
        window.addEventListener('beforeunload', () => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });
    }
    init();
</script>
</body>
</html>
