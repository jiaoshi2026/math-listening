		</div>
		
		<div class="mode-selector">

			<button class="mode-btn" data-mode="length-sort">长度单位排序</button>
			<button class="mode-btn" data-mode="weight-sort">质量单位排序</button>
		</div>
		
		<div class="sorting-options" id="sortingOptions" style="display: none;">

		</div>
		
		<div class="control-panel">

			<button id="playBtn">播放题目</button>
			<button id="answerBtn">显示答案</button>
			<button id="nextBtn">下一题</button>
			<button id="repeatBtn">重复播放</button>
			<button id="newSetBtn">新题目组</button>
			<button id="toggleQuestionBtn">显示题目</button>
		</div>
		
		<div class="auto-controls">
			<button id="autoPlayBtn">开始自动播放</button>
			<button id="stopAutoBtn" disabled>停止自动播放</button>
		</div>
		
		<div class="progress-bar">

		</div>
		
		<div class="current-question">

			<div class="answer-section" id="answerSection">

		<div class="status" id="status">准备就绪</div>
		
		<div class="question-list" id="questionList">

		</div>

		</div>

		const prevBtn = document.getElementById('prevBtn');
		const playBtn = document.getElementById('playBtn');
		const answerBtn = document.getElementById('answerBtn');
		const nextBtn = document.getElementById('nextBtn');
		const repeatBtn = document.getElementById('repeatBtn');
		const newSetBtn = document.getElementById('newSetBtn');
		const autoPlayBtn = document.getElementById('autoPlayBtn');
		const stopAutoBtn = document.getElementById('stopAutoBtn');
		const modeBtns = document.querySelectorAll('.mode-btn');
		const sortBtns = document.querySelectorAll('.sort-btn');

		// 初始化页面
		function initPage() {
			currentIndex.textContent = currentQuestionIndex + 1;
			totalQuestionsEl.textContent = totalQuestions;
			updateProgress();
			updateQuestionList();
			displayCurrentQuestion();
			
			// 初始状态
			prevBtn.disabled = true;
			answerSection.style.display = 'none';
			updatePlayCount();
			
			// 初始题目隐藏状态
			isQuestionVisible = false;
			updateQuestionVisibility();
		}

		// 选择练习模式
		function selectMode(mode) {
			currentMode = mode;
			
			// 更新按钮状态
			modeBtns.forEach(btn => {
				if (btn.dataset.mode === mode) {
					btn.classList.add('active');
				} else {
					btn.classList.remove('active');
				}
			});
			
			// 显示/隐藏排序选项
			if (mode.includes('sort')) {
				sortingOptions.style.display = 'flex';
			} else {
				sortingOptions.style.display = 'none';
			}
			
			// 重新选择题目
			selectRandomQuestions();
			currentQuestionIndex = 0;
			displayCurrentQuestion();
			updateProgress();
			statusEl.textContent = `已切换到${getModeName(mode)}模式`;
		}

		// 获取模式名称
		function getModeName(mode) {
			const names = {
				'length-add': '长度单位加减运算',
				'weight-add': '质量单位加减运算',
				'length-sort': '长度单位排序',
				'weight-sort': '质量单位排序'
			};
			return names[mode] || '未知模式';
		}

		// 选择排序顺序
		function selectSortOrder(order) {
			currentOrder = order;
			
			// 更新按钮状态
			sortBtns.forEach(btn => {
				if (btn.dataset.order === order) {
					btn.classList.add('active');
				} else {
					btn.classList.remove('active');
				}
			});
			
			// 重新生成排序题目
			if (currentMode.includes('sort')) {
				selectRandomQuestions();
				currentQuestionIndex = 0;
				displayCurrentQuestion();
				updateProgress();
				statusEl.textContent = `已切换到${order === 'asc' ? '从小到大' : '从大到小'}排列`;
			}
		}

		// 随机选择题目
		function selectRandomQuestions() {
			if (!currentMode) return;
			
			// 复制题目池
			const poolCopy = [...questionPool[currentMode]];
			questions = [];
			
			// 随机选择题目
			for (let i = 0; i < totalQuestions && poolCopy.length > 0; i++) {
				const randomIndex = Math.floor(Math.random() * poolCopy.length);
				let question = {...poolCopy[randomIndex]};
				
				// 如果是排序模式，根据当前排序顺序更新题目和答案
				if (currentMode.includes('sort')) {
					const orderText = currentOrder === 'asc' ? '从小到大' : '从大到小';
					question.speech = question.speech.replace(/从[大大小小]+排列/, `${orderText}排列`);
					question.text = question.text.replace(/从[大大小小]+排列/, `${orderText}排列`);
					
					// 反转排序答案
					if (currentOrder === 'desc') {
						const answerParts = question.answer.split('：');
						if (answerParts.length === 2) {
							const values = answerParts[1].split('、');
							if (values.length > 1) {
								question.answer = `${answerParts[0]}：${values.reverse().join('、')}`;
							}
						}
					}
				}
				
				questions.push(question);
				poolCopy.splice(randomIndex, 1);
			}
			
			// 如果题目池不够，补充默认题目
			while (questions.length < totalQuestions) {
				questions.push({
					text: "请选择其他模式",
					speech: "请选择其他模式",
					answer: "请选择其他练习模式",
					type: "length"
				});
			}
		}

		// 显示当前题目
		function displayCurrentQuestion() {
			if (questions.length === 0) {
				questionText.textContent = "请选择练习模式开始练习";
				questionText.className = "question-text question-hidden";
				return;
			}
			
			const question = questions[currentQuestionIndex];
			
			if (isQuestionVisible) {
				questionText.innerHTML = question.text + 
					`<span class="unit-type ${question.type}-unit">${question.type === 'length' ? '长度' : '质量'}</span>`;
				questionText.className = "question-text";
			} else {
				questionText.textContent = "题目已隐藏，点击\"显示题目\"按钮查看";
				questionText.className = "question-text question-hidden";
			}
			
			answerText.textContent = question.answer;
			answerSection.style.display = 'none';
			
			// 重置播放计数
			playCount = 0;
			updatePlayCount();
			
			// 更新按钮状态
			prevBtn.disabled = currentQuestionIndex === 0;
			nextBtn.disabled = currentQuestionIndex === totalQuestions - 1;
			
			// 更新题目列表高亮
			updateQuestionList();
		}

		// 更新题目显示状态
		function updateQuestionVisibility() {
			if (questions.length === 0) return;
			
			if (isQuestionVisible) {
				toggleQuestionBtn.textContent = "隐藏题目";
				const question = questions[currentQuestionIndex];
				questionText.innerHTML = question.text + 
					`<span class="unit-type ${question.type}-unit">${question.type === 'length' ? '长度' : '质量'}</span>`;
				questionText.className = "question-text";
			} else {
				toggleQuestionBtn.textContent = "显示题目";
				questionText.textContent = "题目已隐藏，点击\"显示题目\"按钮查看";
				questionText.className = "question-text question-hidden";
			}
		}

		// 更新进度条
		function updateProgress() {
			const progressPercent = ((currentQuestionIndex + 1) / totalQuestions) * 100;
			progress.style.width = `${progressPercent}%`;
		}

		// 更新题目列表
		function updateQuestionList() {
			questionList.innerHTML = '';
			questions.forEach((question, index) => {
				const item = document.createElement('div');
				item.className = 'question-item';
				if (index === currentQuestionIndex) {
					item.classList.add('active');
				}
				item.innerHTML = `题目 ${index + 1}: ${question.text} 
					<span class="unit-type ${question.type}-unit">${question.type === 'length' ? '长度' : '质量'}</span>`;
				item.addEventListener('click', () => {
					currentQuestionIndex = index;
					displayCurrentQuestion();
					updateProgress();
					// 如果正在自动播放，停止自动播放
					if (isAutoPlaying) {
						stopAutoPlay();
					}
				});
				questionList.appendChild(item);
			});
		}

		// 更新播放计数显示
		function updatePlayCount() {
			playCountEl.textContent = `已播放: ${playCount}/3 遍`;
		}

		// 语音播报函数
		function speakText(text) {
			return new Promise((resolve) => {
				if ('speechSynthesis' in window) {
					// 停止当前正在播放的语音
					window.speechSynthesis.cancel();
					
					const utterance = new SpeechSynthesisUtterance(text);
					utterance.lang = 'zh-CN';
					utterance.rate = 0.5; // 设置语速为0.5倍
					
					utterance.onstart = function() {
						isPlaying = true;
						statusEl.textContent = '正在播放题目...';
						playBtn.disabled = true;
						repeatBtn.disabled = true;
					};
					
					utterance.onend = function() {
						isPlaying = false;
						statusEl.textContent = '播放完成';
						playBtn.disabled = false;
						repeatBtn.disabled = false;
						resolve();
					};
					
					utterance.onerror = function() {
						isPlaying = false;
						statusEl.textContent = '播放出错';
						playBtn.disabled = false;
						repeatBtn.disabled = false;
						resolve();
					};
					
					window.speechSynthesis.speak(utterance);
				} else {
					alert('您的浏览器不支持语音合成功能，请使用Chrome、Edge或Safari浏览器。');
					resolve();
				}
			});
		}

		// 播放当前题目
		async function playCurrentQuestion() {
			if (questions.length === 0) {
				statusEl.textContent = '请先选择练习模式';
				return;
			}
			
			const question = questions[currentQuestionIndex];
			await speakText(question.speech);
			playCount++;
			updatePlayCount();
		}

		// 自动播放功能
		async function autoPlay() {
			if (isAutoPlaying) {
				// 播放当前题目三遍
				for (let i = playCount; i < 3; i++) {
					if (!isAutoPlaying) break; // 如果停止自动播放，退出循环
					await playCurrentQuestion();
				}
				
				// 如果已经播放了三遍，并且自动播放还在继续，等待3秒后进入下一题
				if (isAutoPlaying && playCount >= 3) {
					// 延迟3秒后进入下一题
					statusEl.textContent = '等待3秒后进入下一题...';
					await new Promise(resolve => {
						autoPlayTimeout = setTimeout(resolve, 3000);
					});
					
					if (isAutoPlaying && currentQuestionIndex < totalQuestions - 1) {
						currentQuestionIndex++;
						displayCurrentQuestion();
						updateProgress();
						// 继续自动播放
						autoPlay();
					} else if (currentQuestionIndex >= totalQuestions - 1) {
						// 所有题目播放完毕
						stopAutoPlay();
						statusEl.textContent = '所有题目已播放完毕';
					}
				}
			}
		}

		// 开始自动播放
		function startAutoPlay() {
			if (questions.length === 0) {
				statusEl.textContent = '请先选择练习模式';
				return;
			}
			
			isAutoPlaying = true;
			autoPlayBtn.disabled = true;
			stopAutoBtn.disabled = false;
			statusEl.textContent = '自动播放已开始';
			// 禁用其他控制按钮
			prevBtn.disabled = true;
			nextBtn.disabled = true;
			playBtn.disabled = true;
			repeatBtn.disabled = true;
			newSetBtn.disabled = true;
			toggleQuestionBtn.disabled = true;
			modeBtns.forEach(btn => btn.disabled = true);
			sortBtns.forEach(btn => btn.disabled = true);
			
			autoPlay();
		}

		// 停止自动播放
		function stopAutoPlay() {
			isAutoPlaying = false;
			autoPlayBtn.disabled = false;
			stopAutoBtn.disabled = true;
			statusEl.textContent = '自动播放已停止';
			// 启用其他控制按钮
			prevBtn.disabled = currentQuestionIndex === 0;
			nextBtn.disabled = currentQuestionIndex === totalQuestions - 1;
			playBtn.disabled = false;
			repeatBtn.disabled = false;
			newSetBtn.disabled = false;
			toggleQuestionBtn.disabled = false;
			modeBtns.forEach(btn => btn.disabled = false);
			sortBtns.forEach(btn => btn.disabled = false);
			
			if (autoPlayTimeout) {
				clearTimeout(autoPlayTimeout);
				autoPlayTimeout = null;
			}
			
			// 停止语音
			window.speechSynthesis.cancel();
		}

		// 事件监听
		playBtn.addEventListener('click', async () => {
			await playCurrentQuestion();
		});

		repeatBtn.addEventListener('click', async () => {
			await playCurrentQuestion();
		});

		answerBtn.addEventListener('click', () => {
			answerSection.style.display = 'block';
		});

		prevBtn.addEventListener('click', () => {
			if (currentQuestionIndex > 0) {
				currentQuestionIndex--;
				displayCurrentQuestion();
				updateProgress();
			}
		});

		nextBtn.addEventListener('click', () => {
			if (currentQuestionIndex < totalQuestions - 1) {
				currentQuestionIndex++;
				displayCurrentQuestion();
				updateProgress();
			}
		});

		newSetBtn.addEventListener('click', () => {
			// 停止自动播放
			if (isAutoPlaying) {
				stopAutoPlay();
			}
			// 重新选择题目
			selectRandomQuestions();
			currentQuestionIndex = 0;
			displayCurrentQuestion();
			updateProgress();
			statusEl.textContent = '已生成新题目组';
		});

		autoPlayBtn.addEventListener('click', () => {
			startAutoPlay();
		});

		stopAutoBtn.addEventListener('click', () => {
			stopAutoPlay();
		});

		toggleQuestionBtn.addEventListener('click', () => {
			isQuestionVisible = !isQuestionVisible;
			updateQuestionVisibility();
		});

		// 模式选择事件
		modeBtns.forEach(btn => {
			btn.addEventListener('click', () => {
				selectMode(btn.dataset.mode);
			});
		});

		// 排序选择事件
		sortBtns.forEach(btn => {
			btn.addEventListener('click', () => {
				selectSortOrder(btn.dataset.order);
			});
		});

		// 初始化页面
		document.addEventListener('DOMContentLoaded', initPage);
	</script>
</body>
</html>
